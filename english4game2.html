<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스트로베리엘리펀트 영어4 게임</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
  background: linear-gradient(135deg, #fff0f5 0%, #ffe0f0 50%, #ffd6e8 100%);
  min-height: 100vh;
}

/* ── 공통 화면 ── */
.screen { display: none; width: 100%; height: 100vh; position: relative; overflow: hidden; }
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* ── 공통 오버레이 (body 최상위) ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  align-items: center; justify-content: center;
  z-index: 9999;
  display: none;
}
.overlay.show { display: flex; }
.overlay-box {
  background: #fff;
  border-radius: 24px;
  padding: 36px 40px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  max-width: 380px;
  width: 90%;
}
.overlay-box h2 { font-size: 1.9rem; margin-bottom: 10px; }
.overlay-box p  { color: #666; margin-bottom: 18px; font-size: 0.95rem; }
.overlay-box .earned { font-size: 1.4rem; margin-bottom: 22px; }

.btn-primary {
  background: linear-gradient(135deg, #ff6fa3, #ff3d7f);
  color: #fff; border: none; border-radius: 14px;
  padding: 12px 28px; font-size: 1rem; font-weight: 700;
  cursor: pointer; margin: 5px;
}
.btn-secondary {
  background: #f0f0f0; color: #555; border: none; border-radius: 14px;
  padding: 12px 28px; font-size: 1rem; font-weight: 700;
  cursor: pointer; margin: 5px;
}

/* ── 메인 메뉴 ── */
#mainMenu {
  background: linear-gradient(160deg, #ff6fa3 0%, #ff9ac1 40%, #ffb8d4 100%);
}
.main-title   { font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 3px 8px rgba(200,0,80,.3); margin-bottom: 8px; letter-spacing: 1px; }
.main-subtitle{ font-size: 1rem; color: rgba(255,255,255,.85); margin-bottom: 36px; }
.menu-cards   { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.menu-card {
  background: #fff; border-radius: 20px; padding: 26px 28px;
  width: 190px; text-align: center; cursor: pointer;
  box-shadow: 0 8px 24px rgba(200,0,80,.18);
  transition: transform .2s, box-shadow .2s;
}
.menu-card:hover { transform: translateY(-6px); box-shadow: 0 14px 32px rgba(200,0,80,.28); }
.menu-card .icon { font-size: 2.8rem; margin-bottom: 10px; }
.menu-card .name { font-size: 1rem; font-weight: 700; color: #d63584; margin-bottom: 5px; }
.menu-card .desc { font-size: .78rem; color: #888; line-height: 1.4; }
.strawberry-count {
  margin-top: 26px;
  background: rgba(255,255,255,.3); border-radius: 50px;
  padding: 10px 24px; font-size: 1.1rem; color: #fff; font-weight: 700;
}

/* ── 게임1: 단어 매칭 ── */
#game1 { background: linear-gradient(135deg,#fff8fc 0%,#ffe8f4 100%); padding: 20px; }
.game-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px; width: 100%; max-width: 720px;
}
.back-btn {
  background: #ff6fa3; color: #fff; border: none; border-radius: 12px;
  padding: 8px 16px; font-size: .9rem; cursor: pointer; font-weight: 700; white-space: nowrap;
}
.game-title { font-size: 1.2rem; font-weight: 800; color: #d63584; flex: 1; }
.score-box  { background: #ff6fa3; color: #fff; border-radius: 12px; padding: 8px 16px; font-weight: 700; font-size: .95rem; white-space: nowrap; }

.matching-area { display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap; justify-content: center; max-width: 720px; }
.picture-area, .word-area { display: flex; flex-direction: column; gap: 8px; }
.pic-card, .word-card {
  padding: 10px 18px; border-radius: 14px; font-size: 1rem;
  cursor: pointer; border: 3px solid #ffb8d4; background: #fff;
  transition: all .15s; text-align: center; min-width: 130px; user-select: none;
}
.pic-card { font-size: 1.5rem; }
.pic-card.selected, .word-card.selected { border-color: #ff6fa3; background: #fff0f8; transform: scale(1.06); }
.pic-card.matched,  .word-card.matched  { border-color: #4caf50; background: #f0fff4; opacity: .55; pointer-events: none; }
.pic-card.wrong,    .word-card.wrong    { border-color: #f44336; background: #fff3f3; animation: shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* ── 단어 관리 패널 ── */
#wordMgr {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 9999; display: none;
  align-items: center; justify-content: center;
}
#wordMgr.show { display: flex; }
.mgr-box {
  background: #fff; border-radius: 22px; padding: 28px 30px;
  width: min(480px, 94vw); max-height: 88vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
}
.mgr-box h3 { font-size: 1.3rem; font-weight: 800; color: #d63584; margin-bottom: 16px; }
.add-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.add-row input {
  flex: 1; min-width: 80px; padding: 9px 12px; border-radius: 10px;
  border: 2px solid #ffb8d4; font-size: .9rem; outline: none;
}
.add-row input:focus { border-color: #ff6fa3; }
.add-row button { background: #ff6fa3; color: #fff; border: none; border-radius: 10px; padding: 9px 14px; font-weight: 700; cursor: pointer; font-size:.9rem; }
.word-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.word-row {
  display: flex; align-items: center; gap: 10px;
  background: #fff8fc; border-radius: 10px; padding: 8px 12px;
  border: 1px solid #ffddee;
}
.word-row .em  { font-size: 1.4rem; width: 32px; text-align: center; }
.word-row .wd  { font-weight: 700; color: #333; flex: 1; }
.word-row .kr  { color: #888; font-size: .85rem; }
.word-row .del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.1rem; padding: 0 4px; }
.word-row .del:hover { color: #f44336; }
.word-row .spk { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0 4px; color: #aaa; }
.word-row .spk:hover { color: #ff6fa3; }
.mgr-footer { display: flex; justify-content: flex-end; gap: 8px; }

/* ── 게임2: 단어 캐처 ── */
#game2 { padding: 0; }
#catchCanvas { display: block; touch-action: none; }
#g2ui {
  position: absolute; top: 0; left: 0; right: 0;
  pointer-events: none; z-index: 10; padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
}
#g2ui .back-btn { pointer-events: all; }
.g2score { background: rgba(255,255,255,.15); color: #fff; border-radius: 10px; padding: 6px 12px; font-weight: 700; font-size:.9rem; }
.g2life  { background: rgba(255,80,120,.3); color: #ff8cb0; border-radius: 10px; padding: 6px 12px; font-weight: 700; font-size:.9rem; }
.g2timer { background: rgba(255,200,0,.2); color: #ffd700; border-radius: 10px; padding: 6px 12px; font-weight: 700; font-size:.9rem; margin-left: auto; }

#targetDisplay {
  position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,.12); border: 2px solid rgba(255,200,100,.4);
  border-radius: 16px; padding: 8px 18px;
  display: flex; align-items: center; gap: 12px;
  pointer-events: all; z-index: 10; cursor: pointer;
}
#targetDisplay .t-emoji { font-size: 2rem; }
#targetDisplay .t-word  { font-size: 1rem; font-weight: 800; color: #fff; }
#targetDisplay .t-hint  { font-size: .75rem; color: rgba(255,255,255,.5); }
#targetDisplay .t-spk   { font-size: 1.1rem; }

#g2Start, #g2Over {
  position: absolute; inset: 0;
  background: rgba(10,0,30,.88);
  flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; color: #fff;
}
#g2Start { display: flex; }
#g2Over  { display: none; }
#g2Over.show { display: flex; }
#g2Start h2, #g2Over h2 { font-size: 1.8rem; margin-bottom: 10px; }
#g2Start p { color: rgba(255,255,255,.65); margin-bottom: 4px; font-size:.88rem; }
.cost        { font-size: 1.1rem; color: #ff8cb0; margin: 14px 0; }
.strawberry-now { font-size: 1.2rem; color: #ffd700; margin-bottom: 18px; }
.final-score { font-size: 1.3rem; color: #ffd700; margin-bottom: 8px; }
.earned-s    { font-size: 1.1rem; color: #ff8cb0; margin-bottom: 22px; }
</style>
</head>
<body>

<!-- ══ 공통 오버레이들 (body 최상위) ══ -->

<!-- 게임1 결과 -->
<div class="overlay" id="matchResult">
  <div class="overlay-box">
    <h2 id="matchResultTitle">🎉</h2>
    <p  id="matchResultMsg"></p>
    <div class="earned" id="matchEarned"></div>
    <button class="btn-primary"   onclick="overlayClose('matchResult'); startGame1()">다시 하기</button>
    <button class="btn-secondary" onclick="overlayClose('matchResult'); goMenu()">메뉴로</button>
  </div>
</div>

<!-- 단어 관리 패널 -->
<div id="wordMgr">
  <div class="mgr-box">
    <h3>📝 단어 목록 관리</h3>
    <div class="add-row">
      <input id="inEmoji" placeholder="그림 (예: 🐙)" maxlength="4">
      <input id="inWord"  placeholder="영어 단어" maxlength="30">
      <input id="inKr"    placeholder="한국어 뜻" maxlength="20">
      <button onclick="addWord()">+ 추가</button>
    </div>
    <div class="word-list" id="wordListEl"></div>
    <div class="mgr-footer">
      <button class="btn-secondary" onclick="closeMgr()">닫기</button>
    </div>
  </div>
</div>

<!-- ══ 메인 메뉴 ══ -->
<div id="mainMenu" class="screen active">
  <div class="main-title">🍓 스트로베리엘리펀트</div>
  <div class="main-subtitle">영어4 단어 게임 모음</div>
  <div class="menu-cards">
    <div class="menu-card" onclick="startGame1()">
      <div class="icon">🃏</div>
      <div class="name">단어 매칭</div>
      <div class="desc">그림과 단어를 연결해요!<br>딸기를 모아요 🍓</div>
    </div>
    <div class="menu-card" onclick="tryStartGame2()">
      <div class="icon">🧺</div>
      <div class="name">단어 캐처</div>
      <div class="desc">떨어지는 단어를<br>바구니로 받아요!</div>
    </div>
    <div class="menu-card" onclick="openMgr()">
      <div class="icon">📝</div>
      <div class="name">단어 추가</div>
      <div class="desc">단어를 직접 추가하고<br>발음을 들어봐요!</div>
    </div>
  </div>
  <div class="strawberry-count">🍓 보유 딸기: <span id="menuSC">0</span>개</div>
</div>

<!-- ══ 게임1: 단어 매칭 ══ -->
<div id="game1" class="screen">
  <div class="game-header">
    <button class="back-btn" onclick="goMenu()">← 메뉴</button>
    <div class="game-title">🃏 단어 매칭 게임</div>
    <button class="back-btn" style="background:#a78bfa;" onclick="openMgr()">📝 단어 관리</button>
    <div class="score-box">🍓 <span id="g1score">0</span></div>
  </div>
  <div class="matching-area">
    <div class="picture-area" id="picArea"></div>
    <div class="word-area"    id="wordArea"></div>
  </div>
</div>

<!-- ══ 게임2: 단어 캐처 ══ -->
<div id="game2" class="screen">
  <canvas id="catchCanvas"></canvas>

  <div id="g2ui">
    <button class="back-btn" onclick="goMenu()">← 메뉴</button>
    <div class="g2score">점수 <span id="g2scoreVal">0</span></div>
    <div class="g2life"><span id="g2lifeVal">❤️❤️❤️</span></div>
    <div class="g2timer">⏱ <span id="g2timerVal">60</span>s</div>
  </div>

  <div id="targetDisplay" onclick="speakWord(targetItem && targetItem.word)">
    <span class="t-emoji" id="targetEmoji">🍎</span>
    <span class="t-spk">🔊</span>
  </div>

  <div id="g2Start">
    <div style="font-size:3rem;margin-bottom:12px;">🧺</div>
    <h2>단어 캐처</h2>
    <p>하늘에서 떨어지는 단어 중</p>
    <p>그림에 맞는 단어를 바구니로 받으세요!</p>
    <p style="margin-top:10px;font-size:.82rem;color:rgba(255,255,255,.4);">← → 키 또는 화면 드래그로 바구니 이동</p>
    <div class="cost">입장료: 🍓 3개</div>
    <div class="strawberry-now">보유 딸기: <span id="g2StartSC">0</span>개</div>
    <button class="btn-primary" onclick="beginCatchGame()">게임 시작!</button>
    <button class="btn-secondary" style="margin-top:8px;" onclick="goMenu()">돌아가기</button>
  </div>

  <div id="g2Over">
    <div style="font-size:2.5rem;margin-bottom:8px;">🎮</div>
    <h2 id="g2OverTitle">게임 종료!</h2>
    <div class="final-score">점수: <span id="g2FinalScore">0</span>점</div>
    <div class="earned-s" id="g2EarnedS"></div>
    <button class="btn-primary"   onclick="restartCatch()">다시 하기 🍓×3</button>
    <button class="btn-secondary" style="margin-top:8px;" onclick="goMenu()">메뉴로</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  단어 데이터 (localStorage로 영속 저장)
// ══════════════════════════════════════════════════════
// 천재교육 영어4 (함순애) 2022 개정 단원별 핵심 단어
// 천재교육 영어4 (함순애) 2022 개정 – 교과서 실제 단어
const DEFAULT_WORDS = [
  // Lesson 1 – My Name Is Amy (인사·소개)

  {emoji:'😴', word:'sleepy',     kr:'졸린'},

  {emoji:'😫', word:'thirsty',    kr:'목마른'},
  {emoji:'🔁', word:'again',      kr:'다시'},
  {emoji:'💪', word:'try',        kr:'시도하다'},
  {emoji:'💧', word:'water',      kr:'물'},
  // Lesson 3 – Don't Sit Here (금지·경고)
  {emoji:'🥤', word:'drink',      kr:'마시다'},
  {emoji:'🍽️', word:'eat',        kr:'먹다'},

  {emoji:'👋', word:'welcome',    kr:'환영하다'},
  {emoji:'❤️', word:'love',       kr:'사랑하다'},
  {emoji:'⚠️', word:'careful',    kr:'조심하는'},

  // Lesson 4 – Let's Play Basketball (스포츠)
  {emoji:'🎮', word:'play',       kr:'놀다'},
  {emoji:'⚾', word:'baseball',   kr:'야구'},
  {emoji:'🏀', word:'basketball', kr:'농구'},
  {emoji:'⚽', word:'soccer',     kr:'축구'},
  {emoji:'🎾', word:'tennis',     kr:'테니스'},
  {emoji:'🏸', word:'badminton',  kr:'배드민턴'},

  {emoji:'🍞', word:'bread',      kr:'빵'},

  {emoji:'🛏️', word:'bed',        kr:'침대'},

  {emoji:'🚌', word:'bus',        kr:'버스'},

  {emoji:'🌬️', word:'fan',        kr:'부채'},
  {emoji:'💡', word:'know',       kr:'알다'},
  {emoji:'🪵', word:'table',      kr:'탁자'},
  {emoji:'⬇️', word:'under',      kr:'아래에'},
  {emoji:'❓', word:'where',      kr:'어디에'},
  {emoji:'🧢', word:'cap',        kr:'모자'},
];

const WORD_VERSION = 'v5'; // 단어 목록 버전 (바뀌면 localStorage 초기화)
function loadWords() {
  try {
    const ver = localStorage.getItem('se_words_ver');
    const raw = localStorage.getItem('se_words');
    if (ver === WORD_VERSION && raw) return JSON.parse(raw);
    // 버전 다르면 기본 단어로 초기화
    localStorage.setItem('se_words_ver', WORD_VERSION);
    localStorage.removeItem('se_words');
    return [...DEFAULT_WORDS];
  } catch { return [...DEFAULT_WORDS]; }
}
function saveWords() {
  try { localStorage.setItem('se_words', JSON.stringify(WORDS)); } catch {}
}
let WORDS = loadWords();

// ══════════════════════════════════════════════════════
//  TTS 발음
// ══════════════════════════════════════════════════════
function speakWord(word) {
  if (!word) return;
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word);
    u.lang = 'en-US'; u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }
}

// ══════════════════════════════════════════════════════
//  딸기 (점수 화폐)
// ══════════════════════════════════════════════════════
let strawberries = 0;
function addStrawberry(n) { strawberries = Math.max(0, strawberries + n); updateSC(); }
function spendStrawberry(n) { if (strawberries < n) return false; strawberries -= n; updateSC(); return true; }
function updateSC() {
  document.getElementById('menuSC').textContent    = strawberries;
  document.getElementById('g2StartSC').textContent = strawberries;
}

// ══════════════════════════════════════════════════════
//  화면 전환 & 오버레이
// ══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function overlayShow(id) { document.getElementById(id).classList.add('show'); }
function overlayClose(id){ document.getElementById(id).classList.remove('show'); }

function goMenu() {
  catchStop();
  // 모든 오버레이 닫기
  ['matchResult', 'wordMgr'].forEach(overlayClose);
  showScreen('mainMenu');
  updateSC();
}

// ══════════════════════════════════════════════════════
//  단어 관리 패널
// ══════════════════════════════════════════════════════
function openMgr() { renderWordList(); overlayShow('wordMgr'); }
function closeMgr() { overlayClose('wordMgr'); }

function renderWordList() {
  const el = document.getElementById('wordListEl');
  el.innerHTML = '';
  WORDS.forEach((w, i) => {
    const row = document.createElement('div');
    row.className = 'word-row';
    row.innerHTML = `
      <span class="em">${w.emoji}</span>
      <span class="wd">${w.word}</span>
      <span class="kr">${w.kr}</span>
      <button class="spk" onclick="speakWord('${w.word}')" title="발음 듣기">🔊</button>
      ${i >= DEFAULT_WORDS.length
        ? `<button class="del" onclick="deleteWord(${i})" title="삭제">✕</button>`
        : `<span style="width:24px"></span>`}
    `;
    el.appendChild(row);
  });
}

function addWord() {
  const emoji = document.getElementById('inEmoji').value.trim();
  const word  = document.getElementById('inWord').value.trim().toLowerCase();
  const kr    = document.getElementById('inKr').value.trim();
  if (!emoji || !word || !kr) { alert('세 칸을 모두 채워주세요!'); return; }
  if (WORDS.find(w => w.word === word)) { alert('이미 있는 단어예요!'); return; }
  WORDS.push({emoji, word, kr});
  saveWords();
  document.getElementById('inEmoji').value = '';
  document.getElementById('inWord').value  = '';
  document.getElementById('inKr').value    = '';
  speakWord(word);
  renderWordList();
}

function deleteWord(i) {
  if (!confirm(`'${WORDS[i].word}' 을 삭제할까요?`)) return;
  WORDS.splice(i, 1);
  saveWords();
  renderWordList();
}

// ══════════════════════════════════════════════════════
//  게임1: 단어 매칭
// ══════════════════════════════════════════════════════
let g1score = 0, g1selected = null, g1pairs = [], g1matchedCount = 0;

function startGame1() {
  showScreen('game1');
  overlayClose('matchResult');
  g1score = 0; g1selected = null; g1matchedCount = 0;
  document.getElementById('g1score').textContent = 0;

  const count = Math.min(8, WORDS.length);
  g1pairs = [...WORDS].sort(() => Math.random() - .5).slice(0, count);

  const picArea  = document.getElementById('picArea');
  const wordArea = document.getElementById('wordArea');
  picArea.innerHTML = ''; wordArea.innerHTML = '';

  const picOrder  = [...g1pairs].sort(() => Math.random() - .5);
  const wordOrder = [...g1pairs].sort(() => Math.random() - .5);

  picOrder.forEach(item => {
    const d = document.createElement('div');
    d.className = 'pic-card'; d.textContent = item.emoji;
    d.dataset.word = item.word; d.dataset.type = 'pic';
    d.onclick = () => selectCard(d);
    picArea.appendChild(d);
  });
  wordOrder.forEach(item => {
    const d = document.createElement('div');
    d.className = 'word-card'; d.textContent = item.word;
    d.dataset.word = item.word; d.dataset.type = 'word';
    d.onclick = () => { speakWord(item.word); selectCard(d); };
    wordArea.appendChild(d);
  });
}

function selectCard(el) {
  if (el.classList.contains('matched') || el.classList.contains('wrong')) return;
  if (!g1selected) { el.classList.add('selected'); g1selected = el; return; }
  if (g1selected.dataset.type === el.dataset.type) {
    g1selected.classList.remove('selected'); el.classList.add('selected');
    g1selected = el; return;
  }
  if (g1selected.dataset.word === el.dataset.word) {
    g1selected.classList.replace('selected','matched');
    el.classList.add('matched');
    g1matchedCount++; g1score += 10;
    document.getElementById('g1score').textContent = g1score;
    g1selected = null;
    if (g1matchedCount === g1pairs.length) {
      const earned = Math.floor(g1score / 20);
      addStrawberry(earned);
      setTimeout(() => {
        document.getElementById('matchResultTitle').textContent = '🎉 완성!';
        document.getElementById('matchResultMsg').textContent   = `${g1score}점으로 모두 맞췄어요!`;
        document.getElementById('matchEarned').textContent      = `🍓 ${earned}개 획득! (총 ${strawberries}개)`;
        overlayShow('matchResult');
      }, 400);
    }
  } else {
    const prev = g1selected;
    g1selected.classList.remove('selected'); g1selected = null;
    prev.classList.add('wrong'); el.classList.add('wrong');
    setTimeout(() => { prev.classList.remove('wrong'); el.classList.remove('wrong'); }, 600);
    g1score = Math.max(0, g1score - 2);
    document.getElementById('g1score').textContent = g1score;
  }
}

// ══════════════════════════════════════════════════════
//  게임2: 단어 캐처
// ══════════════════════════════════════════════════════
const CATCH_COST = 3;
let canvas, ctx;
let basketX, basketY, basketW = 110, basketH = 46;
let falling = [];
let g2score = 0, g2life = 3, g2timer = 60;
let catchRunning = false, catchAnimId = null;
let spawnIntv = null, timerIntv = null;
let targetItem = null;
let moveLeft = false, moveRight = false, touchTargetX = null;
let lastTs = 0, effects = [];
let stars = [];
const COLORS = ['#ff6fa3','#64b5f6','#81c784','#ffb74d','#ba68c8','#4dd0e1','#f06292','#aed581'];

function tryStartGame2() {
  showScreen('game2');
  updateSC();
  document.getElementById('g2Start').style.display = 'flex';
  document.getElementById('g2Over').classList.remove('show');
  canvas = document.getElementById('catchCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  initStars(); drawBg();
}

function beginCatchGame() {
  if (!spendStrawberry(CATCH_COST)) { alert('딸기가 부족해요! 단어 매칭에서 딸기를 모아오세요 🍓'); return; }
  document.getElementById('g2Start').style.display = 'none';
  initCatch();
}

function restartCatch() {
  document.getElementById('g2Over').classList.remove('show');
  if (!spendStrawberry(CATCH_COST)) { alert('딸기가 부족해요! 🍓'); goMenu(); return; }
  initCatch();
}

function initCatch() {
  resizeCanvas();
  basketX = canvas.width / 2 - basketW / 2;
  basketY = canvas.height - basketH - 20;
  falling = []; effects = [];
  g2score = 0; g2life = 3; g2timer = 60;
  catchRunning = true;
  newTarget();
  clearInterval(spawnIntv); spawnIntv = setInterval(spawnWord, 1300);
  clearInterval(timerIntv); timerIntv = setInterval(() => {
    if (!catchRunning) return;
    g2timer--;
    document.getElementById('g2timerVal').textContent = g2timer;
    if (g2timer <= 0) endCatch(true);
  }, 1000);
  updateG2HUD();
  lastTs = performance.now();
  if (catchAnimId) cancelAnimationFrame(catchAnimId);
  catchAnimId = requestAnimationFrame(catchLoop);
}

function newTarget() {
  targetItem = WORDS[Math.floor(Math.random() * WORDS.length)];
  document.getElementById('targetEmoji').textContent = targetItem.emoji;
  speakWord(targetItem.word);
}

function spawnWord() {
  if (!catchRunning || WORDS.length < 2) return;
  const isCorrect = Math.random() < 0.28;
  const item = isCorrect ? targetItem
    : WORDS.filter(w => w.word !== targetItem.word)[Math.floor(Math.random() * (WORDS.length - 1))];
  const fs = Math.max(14, Math.min(18, canvas.width * 0.028));
  ctx.font = `bold ${fs}px sans-serif`;
  const tw = ctx.measureText(item.word).width + 28;
  const th = fs + 22;
  falling.push({
    x: Math.random() * (canvas.width - tw - 20) + 10,
    y: -th, word: item.word,
    correct: item.word === targetItem.word,
    speed: 1.6 + Math.random() * 1.4 + (60 - g2timer) * 0.025,
    color: isCorrect ? '#ffd700' : COLORS[Math.floor(Math.random() * COLORS.length)],
    w: tw, h: th, fs,
  });
}

function catchLoop(ts) {
  if (!catchRunning) return;
  const dt = Math.min((ts - lastTs) / 16.67, 3); lastTs = ts;

  if (moveLeft)  basketX -= 6 * dt;
  if (moveRight) basketX += 6 * dt;
  if (touchTargetX !== null) basketX += (touchTargetX - basketW/2 - basketX) * 0.18;
  basketX = Math.max(0, Math.min(canvas.width - basketW, basketX));

  drawBg();
  drawBasket();

  for (let i = falling.length - 1; i >= 0; i--) {
    const f = falling[i];
    f.y += f.speed * dt;
    if (f.y + f.h >= basketY && f.y <= basketY + basketH &&
        f.x + f.w >= basketX && f.x <= basketX + basketW) {
      falling.splice(i, 1);
      if (f.correct) {
        g2score += 10;
        pushFx(f.x + f.w/2, basketY, '✨ +10', '#ffd700');
        newTarget();
      } else {
        g2life--;
        pushFx(f.x + f.w/2, basketY, '❌ -1❤️', '#ff4444');
        if (g2life <= 0) { endCatch(false); return; }
      }
      updateG2HUD(); continue;
    }
    if (f.y > canvas.height + 10) {
      falling.splice(i, 1);
      if (f.correct) {
        g2life--;
        pushFx(canvas.width/2, canvas.height - 70, '놓쳤어요! -1❤️', '#ff8c00');
        if (g2life <= 0) { endCatch(false); return; }
        updateG2HUD();
      }
      continue;
    }
    drawFWord(f);
  }
  drawFx(dt);
  catchAnimId = requestAnimationFrame(catchLoop);
}

function drawBg() {
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#0d0520'); g.addColorStop(1,'#1a0540');
  ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x*canvas.width, s.y*canvas.height, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${0.3+s.a*0.7})`; ctx.fill();
  });
}

function drawFWord(f) {
  const r = f.h/2;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(f.x+r,f.y); ctx.lineTo(f.x+f.w-r,f.y);
  ctx.arcTo(f.x+f.w,f.y,f.x+f.w,f.y+f.h,r);
  ctx.lineTo(f.x+f.w,f.y+f.h-r);
  ctx.arcTo(f.x+f.w,f.y+f.h,f.x,f.y+f.h,r);
  ctx.lineTo(f.x+r,f.y+f.h);
  ctx.arcTo(f.x,f.y+f.h,f.x,f.y,r);
  ctx.lineTo(f.x,f.y+r);
  ctx.arcTo(f.x,f.y,f.x+f.w,f.y,r);
  ctx.closePath();
  ctx.fillStyle   = f.correct ? 'rgba(255,215,0,.2)' : 'rgba(255,255,255,.09)';
  ctx.fill();
  ctx.strokeStyle = f.color; ctx.lineWidth = f.correct ? 2.5 : 1.5; ctx.stroke();
  ctx.fillStyle = f.color;
  ctx.font = `bold ${f.fs}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(f.word, f.x+f.w/2, f.y+f.h/2);
  ctx.restore();
}

function drawBasket() {
  const bx=basketX, by=basketY, bw=basketW, bh=basketH;
  ctx.save();
  ctx.shadowColor='rgba(255,110,160,.5)'; ctx.shadowBlur=18;
  ctx.fillStyle='#ff6fa3';
  ctx.beginPath(); ctx.moveTo(bx+8,by); ctx.lineTo(bx+bw-8,by);
  ctx.lineTo(bx+bw,by+bh); ctx.lineTo(bx,by+bh); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#ff3d7f'; ctx.lineWidth=3; ctx.stroke();
  ctx.fillStyle='#ff9ac1'; ctx.fillRect(bx+4,by,bw-8,10);
  ctx.shadowBlur=0;
  ctx.font=`${bh*.7}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🧺',bx+bw/2,by+bh/2+2);
  ctx.restore();
}

function pushFx(x,y,text,color) { effects.push({x,y,text,color,life:1}); }
function drawFx(dt) {
  effects = effects.filter(e=>e.life>0);
  effects.forEach(e=>{
    ctx.save(); ctx.globalAlpha=e.life;
    ctx.fillStyle=e.color; ctx.font='bold 18px sans-serif'; ctx.textAlign='center';
    ctx.fillText(e.text,e.x,e.y-(1-e.life)*55);
    ctx.restore(); e.life-=0.04*dt;
  });
}

function initStars() {
  stars=[];
  for(let i=0;i<80;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,a:Math.random()});
}

function updateG2HUD() {
  document.getElementById('g2scoreVal').textContent = g2score;
  document.getElementById('g2lifeVal').textContent  = '❤️'.repeat(Math.max(0,g2life));
  document.getElementById('g2timerVal').textContent = g2timer;
}

function endCatch(timeUp) {
  catchRunning = false;
  clearInterval(spawnIntv); clearInterval(timerIntv);
  const earned = Math.floor(g2score/30);
  addStrawberry(earned);
  document.getElementById('g2OverTitle').textContent  = timeUp ? '⏰ 시간 종료!' : '💔 게임 오버';
  document.getElementById('g2FinalScore').textContent = g2score;
  document.getElementById('g2EarnedS').textContent    = earned>0
    ? `🍓 ${earned}개 획득! (총 ${strawberries}개)`
    : '아쉽게도 딸기를 못 얻었어요 😢';
  document.getElementById('g2Over').classList.add('show');
}

function catchStop() {
  catchRunning = false;
  if(catchAnimId){ cancelAnimationFrame(catchAnimId); catchAnimId=null; }
  clearInterval(spawnIntv); spawnIntv=null;
  clearInterval(timerIntv); timerIntv=null;
}

function resizeCanvas() {
  if(!canvas) return;
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  basketY = canvas.height - basketH - 20;
}

// ── 키보드 ──
document.addEventListener('keydown', e=>{ if(e.key==='ArrowLeft') moveLeft=true; if(e.key==='ArrowRight') moveRight=true; });
document.addEventListener('keyup',   e=>{ if(e.key==='ArrowLeft') moveLeft=false; if(e.key==='ArrowRight') moveRight=false; });

// ── 터치 / 마우스 ──
function getClientX(e){ return e.touches ? e.touches[0].clientX : e.clientX; }
document.addEventListener('touchstart', e=>{ if(e.target===canvas) touchTargetX=getClientX(e); },{passive:true});
document.addEventListener('touchmove',  e=>{ if(e.target===canvas) touchTargetX=getClientX(e); },{passive:true});
document.addEventListener('touchend',   ()=>{ touchTargetX=null; });
document.addEventListener('mousemove',  e=>{ if(catchRunning && e.target===canvas) touchTargetX=e.clientX; });
document.addEventListener('mouseleave', ()=>{ touchTargetX=null; });

window.addEventListener('resize', resizeCanvas);
updateSC();
</script>
