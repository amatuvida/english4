<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스트로베리엘리펀트 영어4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#fff8f8;color:#333;}
#header{background:#e53935;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;}
#seImg{width:54px;height:54px;border-radius:50%;object-fit:cover;border:3px solid #fff;flex-shrink:0;}
#htxt h1{font-size:16px;font-weight:700;}#htxt p{font-size:11px;opacity:.85;margin-top:2px;}
#bCount{margin-left:auto;background:rgba(255,255,255,.2);border-radius:20px;padding:5px 12px;font-size:14px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:6px;}#resetBtn{background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.5);border-radius:50%;width:24px;height:24px;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:all .15s;}#resetBtn:hover{background:rgba(255,255,255,.45);}
#unitBarWrap{}#unitBar{display:flex;flex-wrap:wrap;gap:6px;}.selAllBtn{padding:5px 11px;border-radius:20px;border:2px dashed #e53935;background:#fff;color:#e53935;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap;}.selAllBtn:hover{background:#fff5f5;}
.uBtn{padding:5px 11px;border-radius:20px;border:2px solid #ddd;background:#fff;color:#bbb;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.uBtn.on{background:#e53935;border-color:#e53935;color:#fff;font-weight:700;}
.uBtn:hover:not(.on){border-color:#e53935;color:#e53935;}
#Shub{padding:10px 14px 20px;}#Shub h2{font-size:13px;color:#999;margin-bottom:10px;}
.gameGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.gCard{background:#fff;border:2px solid #ffcdd2;border-radius:14px;padding:18px 10px;cursor:pointer;text-align:center;position:relative;transition:all .18s;}
.gCard:hover{border-color:#e53935;transform:translateY(-2px);box-shadow:0 4px 16px rgba(229,57,53,.15);}
.gBadge{position:absolute;top:7px;right:7px;background:#ffcdd2;color:#b71c1c;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;}
.gIcon{font-size:32px;display:block;margin-bottom:8px;}.gName{font-size:13px;font-weight:700;color:#c62828;}.gDesc{font-size:11px;color:#bbb;margin-top:3px;}
#Sgame{display:none;padding:10px 14px 24px;}#Sresult{display:none;padding:20px 16px;text-align:center;}
.backBtn{background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:10px;display:block;}.backBtn:hover{color:#e53935;}
.progWrap{background:#eee;border-radius:6px;height:7px;margin-bottom:10px;overflow:hidden;}
#prog{height:100%;background:#e53935;border-radius:6px;transition:width .35s;width:0%;}
.scoreRow{display:flex;gap:8px;margin-bottom:12px;}
.sBox{flex:1;background:#fff;border:1.5px solid #ffcdd2;border-radius:12px;padding:7px 6px;text-align:center;}
.sVal{font-size:20px;font-weight:700;}.sLbl{font-size:10px;color:#bbb;margin-top:2px;}.ok{color:#43a047;}.no{color:#e53935;}
.qCard{background:#fff;border:2px solid #ffcdd2;border-radius:14px;padding:20px 14px;text-align:center;margin-bottom:12px;box-shadow:0 3px 12px rgba(229,57,53,.1);}
.qEmoji{font-size:38px;margin-bottom:8px;display:block;}.qText{font-size:18px;font-weight:700;line-height:1.4;display:block;}.qHint{font-size:12px;color:#bbb;margin-top:6px;display:block;}
.listenBtn{display:inline-block;margin:10px auto 4px;padding:6px 16px;background:#fff3e0;border:1.5px solid #ff9800;border-radius:20px;color:#e65100;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.listenBtn:hover{background:#ffe0b2;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.chBtn{padding:13px 8px;border:2px solid #eee;border-radius:12px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;line-height:1.3;transition:all .12s;}
.chBtn:hover:not(:disabled){border-color:#e53935;background:#fff5f5;}
.chBtn.correct{background:#e8f5e9!important;border-color:#43a047!important;color:#1b5e20!important;}
.chBtn.wrong{background:#ffebee!important;border-color:#e53935!important;color:#b71c1c!important;}
.typeRow{display:flex;gap:8px;margin-bottom:8px;}
.typeRow input{flex:1;padding:11px 12px;border:2px solid #eee;border-radius:12px;font-size:15px;font-family:inherit;outline:none;}
.typeRow input:focus{border-color:#e53935;}
.typeBtn{padding:11px 16px;background:#e53935;border:none;border-radius:12px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.typeFb{font-size:13px;text-align:center;min-height:20px;margin-bottom:4px;}
.matchInfo{text-align:center;font-size:12px;color:#e53935;font-weight:700;margin-bottom:8px;}
.matchGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.matchCol{display:flex;flex-direction:column;gap:6px;}
.mItem{padding:10px 8px;border:2px solid #eee;border-radius:12px;font-size:12px;cursor:pointer;background:#fff;text-align:center;transition:all .12s;}
.mItem:hover:not(.matched){background:#fff5f5;}.mItem.selA{border-color:#e53935;background:#ffebee;color:#b71c1c;}
.mItem.selB{border-color:#1565c0;background:#e3f2fd;color:#0d47a1;}
.mItem.matched{border-color:#43a047;background:#e8f5e9;color:#1b5e20;cursor:default;}
.mItem.flash{animation:shake .3s;}@keyframes shake{0%,100%{transform:translateX(0);}30%{transform:translateX(-5px);}70%{transform:translateX(5px)}}
.rpgBox{background:#fff5f5;border:2px solid #ffcdd2;border-radius:14px;padding:14px;margin-bottom:12px;}
.rpgWho{font-size:11px;color:#e53935;font-weight:700;margin-bottom:4px;display:block;}
.rpgSay{font-size:15px;line-height:1.6;display:block;font-weight:600;color:#333;}
.rpgNote{font-size:11px;color:#bbb;margin-top:5px;display:block;}
.rpgAsk{font-size:13px;font-weight:700;margin-bottom:9px;color:#333;display:block;}
.rpgChoices{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.rBtn{padding:12px 14px;border:2px solid #eee;border-radius:12px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;text-align:left;transition:all .12s;}
.rBtn:hover:not(:disabled){border-color:#e53935;background:#fff5f5;}
.rBtn.correct{border-color:#43a047!important;background:#e8f5e9!important;color:#1b5e20!important;}
.rBtn.wrong{border-color:#e53935!important;background:#ffebee!important;color:#b71c1c!important;}
.comment{text-align:center;font-size:13px;color:#e53935;font-weight:600;min-height:34px;padding:5px;}
.rImgWrap{width:140px;height:140px;border-radius:50%;overflow:hidden;border:5px solid #e53935;margin:0 auto 14px;animation:rb .7s ease infinite alternate;}
@keyframes rb{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.rImgWrap img{width:100%;height:100%;object-fit:cover;}
#rTitle{font-size:21px;font-weight:700;color:#b71c1c;margin-bottom:6px;}#rBerry{font-size:44px;margin:10px 0;}
#rMsg{font-size:14px;color:#555;line-height:1.8;margin-bottom:20px;}#rConf{font-size:26px;letter-spacing:3px;margin-bottom:14px;}
.rBtns{display:flex;gap:10px;justify-content:center;}
.btnR{padding:11px 22px;background:#e53935;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btnG{padding:11px 22px;background:#eee;color:#666;border:none;border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;}.btnW{padding:11px 22px;background:#fff3e0;color:#e65100;border:2px solid #ff9800;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}.rBtns{flex-wrap:wrap;}
</style>
</head>

const OK = ["정답! 딸기 추가~","맞았어! 최고!","완벽해!","딸기 먹을 자격!","둘 다 좋아하는 답!"];
const NO = ["괜찮아, 다시 도전!","달달하게 다시!","연습이 실력!","넌 할 수 있어!"];

let selU = new Set();
let berries = 0;
let G = {mode:'', q:[], idx:0, ok:0, no:0, wrong:[]};
let lastWrongPool = []; // 결과화면에서 쓸 오답 목록(QUIZ/TYPE 공용)
let MS = {};

const $ = id => document.getElementById(id);
const rnd = a => a[Math.floor(Math.random()*a.length)];
function shuf(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function getW(){return UN.filter((_,i)=>selU.has(i)).flatMap(u=>u.words);}
function getS(){return UN.filter((_,i)=>selU.has(i)).flatMap(u=>u.sents);}

/* ── TTS ── */
function speak(text, rate){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = rate || 0.85;
  u.pitch = 1.0;
  window.speechSynthesis.speak(u);
}

/* ── 화면 전환 ── */
function show(name){
  ['hub','game','result'].forEach(function(n){
    $('S'+n).style.display=(n===name)?'block':'none';
  });
  $('unitBarWrap').style.display=(name==='hub')?'flex':'none';
}

/* ── 딸기 팝업 ── */
function popBerry(x,y){
  berries++;
  $('bNum').textContent=berries;
  var el=document.createElement('span');
  el.textContent='🍓';
  el.style.cssText='position:fixed;left:'+(x-14)+'px;top:'+(y-14)+'px;font-size:28px;pointer-events:none;z-index:9999;transition:transform 1s,opacity 1s;';
  document.body.appendChild(el);
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    el.style.transform='translateY(-80px) scale(1.4)';
    el.style.opacity='0';
  });});
  setTimeout(function(){el.remove();},1100);
}

/* ── HUD ── */
function hud(){
  $('sOk').textContent=G.ok;
  $('sNo').textContent=G.no;
  $('sCur').textContent=G.idx+'/'+G.q.length;
  $('prog').style.width=G.q.length?Math.round(G.idx/G.q.length*100)+'%':'0%';
}
function say(t){$('comment').textContent=(t==='ok'?'🍓 ':'🐘 ')+rnd(t==='ok'?OK:NO);}

/* ── 요소 생성 ── */
function mk(tag,cls,txt){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!==undefined)e.textContent=txt;
  return e;
}

/* ── 토스트 메시지 (alert 대신, 더 확실하게 보임) ── */
function showToast(msg){
  var old=document.getElementById('seToast');
  if(old) old.remove();
  var t=mk('div',null,msg);
  t.id='seToast';
  t.style.cssText='position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-20px);background:#e53935;color:#fff;padding:12px 22px;border-radius:30px;font-size:14px;font-weight:700;box-shadow:0 4px 18px rgba(229,57,53,.4);z-index:99999;opacity:0;transition:opacity .25s,transform .25s;white-space:nowrap;';
  document.body.appendChild(t);
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      t.style.opacity='1';
      t.style.transform='translateX(-50%) translateY(0)';
    });
  });
  setTimeout(function(){
    t.style.opacity='0';
    t.style.transform='translateX(-50%) translateY(-20px)';
    setTimeout(function(){t.remove();},300);
  },2200);
}

/* ── 커스텀 확인 모달 (confirm 대신, 팝업 차단 회피) ── */
function showConfirm(msg, onYes){
  var old=document.getElementById('seModal');
  if(old) old.remove();
  var overlay=mk('div',null);
  overlay.id='seModal';
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:99999;';
  var box=mk('div',null);
  box.style.cssText='background:#fff;border-radius:16px;padding:24px 20px;max-width:280px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.25);';

  txt.style.cssText='font-size:15px;color:#333;margin-bottom:18px;line-height:1.5;font-weight:600;';
  var btnRow=mk('div',null);
  btnRow.style.cssText='display:flex;gap:10px;justify-content:center;';

  yesBtn.addEventListener('click',function(){overlay.remove(); onYes();});
  noBtn.addEventListener('click',function(){overlay.remove();});

/* ── 게임 시작 ── */
function startGame(mode, customQ){
  if(!customQ && selU.size===0){
    showToast('🍓 먼저 단원을 선택해주세요!');
    return;
  }
  G={mode:mode,q:[],idx:0,ok:0,no:0,wrong:[]};
  $('comment').textContent='';
  show('game');
  if(mode==='quiz')initQuiz(customQ);
  else if(mode==='type')initType(customQ);
  else if(mode==='match')initMatch(customQ);
  else if(mode==='rpg')initRPG(customQ);
}

/* ════ QUIZ ════ */
function initQuiz(customQ){G.q=customQ?shuf(customQ):shuf(getW());hud();stepQuiz();}
function stepQuiz(){
  if(G.idx>=G.q.length){showResult();return;}
  var cur=G.q[G.idx];
  var pool=G.q.filter(function(_,i){return i!==G.idx;});
  var opts=shuf([{d:cur,ok:true}].concat(shuf(pool).slice(0,3).map(function(d){return {d:d,ok:false};})));
  var gc=$('gc'); gc.textContent='';

  var card=mk('div','qCard');
  card.appendChild(mk('div','qEmoji',cur.e));
  card.appendChild(mk('div','qText',cur.m));
  card.appendChild(mk('div','qHint','영어 단어를 골라보세요'));
  gc.appendChild(card);

  var grid=mk('div','choices');
  opts.forEach(function(o){
    var btn=mk('button','chBtn',o.d.w);
    btn.addEventListener('click',function(){
      if(btn.disabled)return;
      grid.querySelectorAll('.chBtn').forEach(function(b){b.disabled=true;});
      var r=btn.getBoundingClientRect();
      if(o.ok){
        btn.classList.add('correct');
        G.ok++; say('ok'); popBerry(r.left+r.width/2,r.top);
        speak(cur.w, 0.85);
      } else {
        btn.classList.add('wrong');
        grid.querySelectorAll('.chBtn').forEach(function(b,i){if(opts[i].ok)b.classList.add('correct');});
        G.no++; say('no'); G.wrong.push(cur);
        speak(cur.w, 0.85);
      }
      G.idx++; hud(); setTimeout(stepQuiz,1400);
    });
    grid.appendChild(btn);
  });
  gc.appendChild(grid);
  hud();
}

/* ════ TYPE ════ */
var tAns='';
function initType(customQ){G.q=customQ?shuf(customQ):shuf(getS());hud();stepType();}
function stepType(){
  if(G.idx>=G.q.length){showResult();return;}
  var cur=G.q[G.idx];
  tAns=cur.en.toLowerCase().replace(/[!?.,]/g,'').trim();
  var gc=$('gc'); gc.textContent='';

  var card=mk('div','qCard');
  card.appendChild(mk('div','qEmoji',cur.e));
  card.appendChild(mk('div','qText',cur.ko));

  /* 🔊 발음 듣기 버튼 */
  var listenBtn=mk('button','listenBtn','🔊 발음 듣기');
  listenBtn.addEventListener('click',function(){speak(cur.en, 0.75);});
  card.appendChild(listenBtn);

  card.appendChild(mk('div','qHint','영어 문장을 입력하세요'));
  gc.appendChild(card);

  var row=mk('div','typeRow');
  var inp=mk('input'); inp.type='text'; inp.placeholder='영어로 입력...';
  var okb=mk('button','typeBtn','확인');
  var fb=mk('div','typeFb');

  function check(){
    if(inp.disabled)return;
    var v=inp.value.toLowerCase().replace(/[!?.,]/g,'').trim();
    if(!v)return;
    inp.disabled=true; okb.disabled=true;
    /* 정답/오답 관계없이 정답 발음 들려주기 */
    speak(cur.en, 0.80);
    if(v===tAns){
      G.ok++; fb.style.color='#388e3c'; fb.textContent='✅ 정답! '+cur.en;
      say('ok'); var r=inp.getBoundingClientRect(); popBerry(r.left+100,r.top);
    } else {
      G.no++; fb.style.color='#c62828'; fb.textContent='❌ 정답: '+cur.en; say('no'); G.wrong.push(cur);
    }
    G.idx++; hud(); setTimeout(stepType,1800);
  }
  okb.addEventListener('click',check);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')check();});
  row.appendChild(inp); row.appendChild(okb);
  gc.appendChild(row); gc.appendChild(fb);
  setTimeout(function(){inp.focus();},60);
  hud();
}

/* ════ MATCH ════ */
function initMatch(customQ){
  var pool=customQ&&customQ.length?customQ:getW();
  MS={sA:null,sB:null,done:new Set(),words:shuf(pool).slice(0,6)};
  G.q=MS.words; G.idx=0; hud(); renderMatch();
}
function renderMatch(){
  var w=MS.words, gc=$('gc'); gc.textContent='';
  gc.appendChild(mk('div','matchInfo','짝 찾기 '+MS.done.size+'/'+w.length));
  var grid=mk('div','matchGrid');
  var cA=mk('div','matchCol'), cB=mk('div','matchCol');
  shuf(w.map(function(_,i){return i;})).forEach(function(i){
    var d=mk('div','mItem',w[i].e+' '+w[i].w); d.id='ma'+i;
    if(MS.done.has(i)){d.classList.add('matched');}
    else{d.addEventListener('click',function(){doA(i);});}
    cA.appendChild(d);
  });
  shuf(w.map(function(_,i){return i;})).forEach(function(i){
    var d=mk('div','mItem',w[i].m); d.id='mb'+i;
    if(MS.done.has(i)){d.classList.add('matched');}
    else{d.addEventListener('click',function(){doB(i);});}
    cB.appendChild(d);
  });
  grid.appendChild(cA); grid.appendChild(cB); gc.appendChild(grid);
}
function doA(i){
  if(MS.done.has(i))return; MS.sA=i;
  document.querySelectorAll('[id^=ma]').forEach(function(e){e.classList.remove('selA');});
  $('ma'+i)&&$('ma'+i).classList.add('selA');
  if(MS.sB!==null)chkM();
}
function doB(i){
  if(MS.done.has(i))return; MS.sB=i;
  document.querySelectorAll('[id^=mb]').forEach(function(e){e.classList.remove('selB');});
  $('mb'+i)&&$('mb'+i).classList.add('selB');
  if(MS.sA!==null)chkM();
}
function chkM(){
  var a=MS.sA, b=MS.sB; MS.sA=null; MS.sB=null;
  if(a===b){
    MS.done.add(a); G.ok++; say('ok');
    speak(MS.words[a].w, 0.85);
    var e=$('mb'+b); if(e){var r=e.getBoundingClientRect();popBerry(r.left+r.width/2,r.top);}
  } else {
    G.no++; say('no'); G.wrong.push(MS.words[a]); if(b!==a) G.wrong.push(MS.words[b]);
    speak(MS.words[a].w, 0.85);
    [$('ma'+a),$('mb'+b)].forEach(function(e){
      if(!e)return;
      e.classList.add('flash');
      setTimeout(function(){e.classList.remove('flash','selA','selB');},400);
    });
  }
  G.idx=MS.done.size; hud();
  if(MS.done.size===MS.words.length)setTimeout(showResult,600);
  else renderMatch();
}

/* ════ RPG ════ */
function initRPG(customQ){G.q=customQ?shuf(customQ):shuf([].concat(RPG_Q));hud();stepRPG();}
function stepRPG(){
  if(G.idx>=G.q.length){showResult();return;}
  var cur=G.q[G.idx], gc=$('gc'); gc.textContent='';

  var box=mk('div','rpgBox');
  box.appendChild(mk('div','rpgWho','🍓🐘 스트로베리엘리펀트'));

  var sayDiv=mk('div','rpgSay',cur.se);
  box.appendChild(sayDiv);

  /* 🔊 스트로베리 발음 버튼 */
  var seBtn=mk('button','listenBtn','🔊 들어보기');
  seBtn.addEventListener('click',function(){speak(cur.se, 0.80);});
  box.appendChild(seBtn);

  box.appendChild(mk('div','rpgNote',cur.scene));
  gc.appendChild(box);
  gc.appendChild(mk('div','rpgAsk',cur.ask));

  /* 문장 등장 시 자동 발음 */
  setTimeout(function(){speak(cur.se, 0.80);}, 300);

  var wrap=mk('div','rpgChoices');
  cur.choices.forEach(function(c,ci){
    var btn=mk('button','rBtn',c);
    btn.addEventListener('click',function(){
      wrap.querySelectorAll('.rBtn').forEach(function(b,i){
        b.disabled=true;
        if(i===cur.ans)b.classList.add('correct');
      });
      var r=btn.getBoundingClientRect();
      if(ci===cur.ans){
        G.ok++; say('ok'); popBerry(r.left+r.width/2,r.top);
        speak(c, 0.85);
      } else {
        G.no++; btn.classList.add('wrong'); say('no'); G.wrong.push(cur);
        speak(cur.choices[cur.ans], 0.85);
      }
      G.idx++; hud(); setTimeout(stepRPG,1600);
    });
    wrap.appendChild(btn);
  });
  gc.appendChild(wrap);
  hud();
}

/* ════ 결과 ════ */
function showResult(){
  show('result');
  var ok=G.ok, pct=Math.round(ok/G.q.length*100);
  var title, msg, conf;
  if(pct>=90){title='🏆 완벽한 영어왕!';msg='와아! 딸기 '+ok+'개나 받았어요! 이 딸기 다 네 거야! 🐘💕';conf='🍓🐘🏆🌟✨';}
  else if(pct>=70){title='🌟 잘했어요!';msg='딸기 '+ok+'개 받았어요! 고마워! 맛있는 딸기야~ 🐘😊';conf='🍓🐘🌟🎉💫';}
  else if(pct>=50){title='💪 좋아요!';msg='딸기 '+ok+'개 모았어요! 같이 연습하면 더 많이! 🐘💪';conf='🍓🐘💪🔥⭐';}
  else{title='🍓 포기하지 마요!';msg='딸기 '+ok+'개 모았어요. 스트로베리엘리펀트가 응원해! 🐘❤️';conf='🍓🐘❤️🌱💫';}
  $('rConf').textContent=conf;
  $('rTitle').textContent=title;
  $('rBerry').textContent='🍓×'+ok+' ('+pct+'%)';
  $('rMsg').textContent=msg;
  var cnt=0;
  var iv=setInterval(function(){
    if(cnt++>16){clearInterval(iv);return;}
    popBerry(Math.random()*window.innerWidth,Math.random()*260+80);
  },130);

  /* 오답 다시 풀기 버튼 표시 여부 */
  var wrongBtn=$('wrongBtn');
  if(G.wrong && G.wrong.length>0 && G.mode!=='match'){
    wrongBtn.style.display='inline-block';
    wrongBtn.textContent='🔁 오답만 다시 풀기 ('+G.wrong.length+'개)';
  } else {
    wrongBtn.style.display='none';
  }
}

/* ════ 초기화 ════ */
window.addEventListener('DOMContentLoaded',function(){
  UN.forEach(function(u,i){
    var btn=mk('button','uBtn',u.title);
    btn.id='ub'+i;
    btn.addEventListener('click',function(){
      if(selU.has(i)){selU.delete(i);}
      else selU.add(i);
      UN.forEach(function(_,j){$('ub'+j).classList.toggle('on',selU.has(j));});
      $('selAllBtn').textContent = (selU.size===UN.length) ? '전체 해제' : '전체 선택';
    });
    $('unitBar').appendChild(btn);
  });
  $('resetBtn').addEventListener('click',function(){
    showConfirm('딸기 ' + berries + '개를 초기화할까요?', function(){
      berries = 0;
      $('bNum').textContent = 0;
      showToast('🍓 딸기를 초기화했어요!');
    });
  });
  $('cQuiz').addEventListener('click',function(){startGame('quiz');});
  $('cType').addEventListener('click',function(){startGame('type');});
  $('cMatch').addEventListener('click',function(){startGame('match');});
  $('cRpg').addEventListener('click',function(){startGame('rpg');});
  $('backBtn').addEventListener('click',function(){show('hub');});
  $('retryBtn').addEventListener('click',function(){startGame(G.mode);});
  $('hubBtn').addEventListener('click',function(){show('hub');});
  $('selAllBtn').addEventListener('click',function(){
    if(selU.size===UN.length){
      selU.clear();
      UN.forEach(function(_,j){$('ub'+j).classList.remove('on');});
      $('selAllBtn').textContent='전체 선택';
    } else {
      UN.forEach(function(_,j){selU.add(j); $('ub'+j).classList.add('on');});
      $('selAllBtn').textContent='전체 해제';
    }
  });
  $('wrongBtn').addEventListener('click',function(){
    var pool=G.wrong.slice();
    var mode=G.mode;
    startGame(mode, pool);
  });
  show('hub');
});

</script>
</body>
</html>
