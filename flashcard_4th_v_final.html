      {name:"Scene 1",lines:[{speaker:"Mr. Jones",en:"The bus is ready. Let's go.",ko:"버스가 준비됐다. 가자."},{speaker:"Eric, 보라, 준오",en:"Yeah!",ko:"예!"},{speaker:"Eric",en:"Where's my bag?",ko:"내 가방은 어디에 있지?"},{speaker:"보라",en:"It's under the chair.",ko:"의자 아래에 있어."},{speaker:"준오",en:"Where's my cap?",ko:"내 모자는 어디에 있지?"},{speaker:"Momo",en:"It's on the table. Here.",ko:"탁자 위에 있어. 여기."},{speaker:"준오",en:"Thank you, Momo.",ko:"고마워, Momo."}]},
      {name:"Scene 2",lines:[{speaker:"Mr. Jones",en:"Sit down, everyone.",ko:"모두 앉으세요."},{speaker:"Eric, 보라, 준오",en:"Okay.",ko:"네."},{speaker:"준오",en:"Where's Momo?",ko:"Momo는 어디에 있어?"},{speaker:"Eric, 보라, 준오",en:"Momo!",ko:"Momo!"}]}
    ],roles:["준오","Eric","보라","Momo"],playerRoleDefault:"준오"},
    {title:"Fun Talk 2",scenes:[
      {name:"Scene 1",lines:[{speaker:"Eric",en:"Where's my pen?",ko:"내 펜은 어디에 있어?"},{speaker:"Sam",en:"I don't know.",ko:"모르겠어."},{speaker:"보라",en:"It's on the desk.",ko:"책상 위에 있어."},{speaker:"Eric",en:"K-O-R-E-A. I like it.",ko:"K-O-R-E-A. 이거 마음에 들어."},{speaker:"보라",en:"I like it, too.",ko:"나도 마음에 들어."}]},
      {name:"Scene 2",lines:[{speaker:"Kate",en:"Tada!",ko:"짜잔!"},{speaker:"준오",en:"Wow, it's nice.",ko:"와, 멋있다."},{speaker:"Kate",en:"Where's my tape?",ko:"내 테이프는 어디에 있어?"},{speaker:"Hoa",en:"Look! It's under the chair.",ko:"봐! 의자 아래에 있어."},{speaker:"Kate",en:"I love Korea!",ko:"나는 한국을 사랑해!"}]}
    ],roles:["준오","Eric","Kate","보라","Sam","Hoa"],playerRoleDefault:"준오"}
   ]},
];

let cU=-1,cM='word',cC=0,fl=false,cT=0,cSc=0,cL=0;
let pRole='',pSc=0,pLines=[],pStep=0;
let rec=null,mic=false,lErr=false,txS=0,tyS=0;

function uc(){return UC[cU]||'u0';}

function showHome(){
  cU=-1;window.speechSynthesis&&window.speechSynthesis.cancel();
  document.getElementById('hv').style.display='block';
  document.getElementById('lv').style.display='none';
  document.getElementById('hv').innerHTML=`
    <div class="home-title">🌟 4학년 1학기 영어</div>
    <div class="home-sub">천재교육 함순애 · 단원을 선택해봐요!</div>
    <div class="lesson-grid">
      ${UN.map((u,i)=>`<div class="lc lc${i}" onclick="goLesson(${i})">
        <div class="lnum">${i+1}</div>
        <div class="lname">${u.sub}</div>
      </div>`).join('')}
    </div>`;
}

function goLesson(i){
  cU=i;cM='word';cC=0;fl=false;cT=0;cSc=0;cL=0;pRole='';pSc=0;
  document.getElementById('hv').style.display='none';
  document.getElementById('lv').style.display='block';
  renderL();
}

function renderL(){
  const u=UN[cU];const [bg,tc]=BG[cU];
  document.getElementById('lv').className=uc();
  document.getElementById('lv').innerHTML=`
    <div class="lhdr">
      <button class="back-btn" onclick="showHome()">← 목록</button>
      <span class="lbadge" style="background:${bg};color:${tc}">${u.title}</span>
      <span class="lsub">${u.sub}</span>
    </div>
    <div class="mtabs">
      ${[['word','🃏','단어'],['sentence','💬','문장'],['talk','📖','대화 카드'],['practice','🎤','말하기']].map(([m,ic,lb])=>
        `<div class="mtab ${cM===m?'on':''}" onclick="setM('${m}')"><span class="ti">${ic}</span>${lb}</div>`
      ).join('')}
    </div>
    <div id="mc"></div>`;
  renderM();
}

function setM(m){cM=m;cC=0;fl=false;cT=0;cSc=0;cL=0;renderL();}

function renderM(){
  const el=document.getElementById('mc');
  if(cM==='word'||cM==='sentence')renderCard(el);
  else if(cM==='talk')renderTalk(el);
  else renderPrac(el);
}

// ── 카드 ──
function renderCard(el){
  const u=UN[cU];
  const items=cM==='word'?u.words:u.sentences;
  const it=items[cC];const tot=items.length;
  const pct=((cC+1)/tot*100).toFixed(0);
  let front,back;
  if(cM==='word'){
    front=`<div class="cem">${it.emoji}</div><div class="cwd">${it.word}</div>`;
    back=`<div class="cem">${it.emoji}</div><div class="cmn">${it.meaning}</div><div class="cpr">${it.pron}</div><div class="cst">${it.sentence}</div><div class="csk">${it.sentKo}</div>
      <button class="abtn" onclick="event.stopPropagation();sEN('${it.word}. ${it.sentence.replace(/'/g,"\\'")}')"><i class="ti ti-volume" aria-hidden="true"></i> 다시 듣기</button>`;
  }else{
    front=`<div class="cem">${it.emoji}</div><div class="cwd">${it.sentence}</div>`;
    back=`<div class="cem">${it.emoji}</div><div class="cst">${it.sentKo}</div>${it.hint?`<div class="cht">${it.hint}</div>`:''}
      <button class="abtn" onclick="event.stopPropagation();sEN('${it.sentence.replace(/'/g,"\\'")}')"><i class="ti ti-volume" aria-hidden="true"></i> 다시 듣기</button>`;
  }
  el.innerHTML=`
    <div class="arow">
      <span class="tl">뒤집으면 자동 읽기</span>
      <label class="tog"><input type="checkbox" id="aSpk" checked><span class="sl"></span></label>
      <span style="font-size:11px;color:var(--color-text-tertiary);margin-left:8px">파닉스: ${u.phonics}</span>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="cwrap ${fl?'fl':''}" id="cw" onclick="doFlip()">
      <div class="cinner">
        <div class="cface">${front}</div>
        <div class="cface cbk">${back}</div>
      </div>
    </div>
    <p class="hint-s">클릭·스페이스 뒤집기 &nbsp;|&nbsp; ←→ 이동·스와이프</p>
    <div class="nav">
      <button class="nb" ${cC===0?'disabled':''} onclick="cGo(-1)">← 이전</button>
      <span class="ctr">${cC+1} / ${tot}</span>
      <button class="nb" ${cC===tot-1?'disabled':''} onclick="cGo(1)">다음 →</button>
    </div>`;
  const cw=document.getElementById('cw');
  if(cw){
    cw.addEventListener('touchstart',e=>{txS=e.touches[0].clientX;tyS=e.touches[0].clientY;},{passive:true});
    cw.addEventListener('touchend',e=>{
      const dx=e.changedTouches[0].clientX-txS,dy=e.changedTouches[0].clientY-tyS;
      if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx<0?cGo(1):cGo(-1);}
    },{passive:true});
  }
}
function doFlip(){
  fl=!fl;
  const cw=document.getElementById('cw');if(cw)cw.classList.toggle('fl',fl);
  if(fl){
    const chk=document.getElementById('aSpk');
    if(chk&&chk.checked){
      const it=(cM==='word'?UN[cU].words:UN[cU].sentences)[cC];
      const txt=cM==='word'?it.word+'. '+it.sentence:it.sentence;
      setTimeout(()=>sEN(txt),420);
    }
  }
}
function cGo(d){
  const items=cM==='word'?UN[cU].words:UN[cU].sentences;
  const n=cC+d;if(n<0||n>=items.length)return;
  cC=n;fl=false;renderM();
}

// ── 대화카드 ──
function renderTalk(el){
  const u=UN[cU];const talks=u.funTalks;
  if(!talks||!talks.length){el.innerHTML='<div style="padding:1.5rem;text-align:center;color:var(--color-text-tertiary);font-size:13px">대본 준비 중이에요 📖</div>';return;}
  const talk=talks[cT];
  const lines=talk.scenes[cSc].lines;
  el.innerHTML=`
    <div class="tpanel">
      <div class="stabs">
        ${talks.map((t,i)=>`<button class="stab ${i===cT?'on':''}" onclick="tSel(${i})">${t.title}</button>`).join('')}
      </div>
      <div class="stabs">
        ${talk.scenes.map((s,i)=>`<button class="stab ${i===cSc?'on':''}" onclick="scSel(${i})">${s.name}</button>`).join('')}
      </div>
      <div class="dlines" id="dl">
        ${lines.map((l,i)=>{const inf=ci(l.speaker);return`
          <div class="dline ${i===cL?'hl':''}" onclick="lClick(${i})">
            <div class="sav">${inf.a}</div>
            <div>
              <div class="snm" style="color:${inf.c}">${l.speaker}</div>
              <div class="sen">${l.en}</div>
              <div class="sko">${l.ko}</div>
            </div>
          </div>`;}).join('')}
      </div>
      <div class="dnav">
        <button class="db" ${cL===0?'disabled':''} onclick="dGo(-1)">← 이전</button>
        <button class="dhear" onclick="spkLine()"><i class="ti ti-volume" aria-hidden="true"></i> 듣기</button>
        <button class="db pr" ${cL===lines.length-1?'disabled':''} onclick="dGo(1)">다음 →</button>
      </div>
    </div>`;
  setTimeout(()=>{const h=document.querySelector('.dline.hl');if(h)h.scrollIntoView({block:'nearest',behavior:'smooth'});},50);
}
function tSel(i){cT=i;cSc=0;cL=0;renderM();}
function scSel(i){cSc=i;cL=0;renderM();}
function lClick(i){cL=i;const l=UN[cU].funTalks[cT].scenes[cSc].lines[i];sAs(l.speaker,l.en);renderM();}
function dGo(d){
  const lines=UN[cU].funTalks[cT].scenes[cSc].lines;
  const n=cL+d;if(n<0||n>=lines.length)return;
  cL=n;sAs(lines[n].speaker,lines[n].en);renderM();
}
function spkLine(){const l=UN[cU].funTalks[cT].scenes[cSc].lines[cL];sAs(l.speaker,l.en);}

// ── 말하기 연습 ──
function renderPrac(el){
  const u=UN[cU];const talks=u.funTalks;
  if(!talks||!talks.length){el.innerHTML='<div style="padding:1.5rem;text-align:center;color:var(--color-text-tertiary);font-size:13px">대본 준비 중이에요 🎤</div>';return;}
  const talk=talks[0];
  if(!pRole)pRole=talk.playerRoleDefault;
  el.innerHTML=`
    <div class="ppanel">
      <div>
        <div class="rlbl">내 역할 선택 👇</div>
        <div class="rbtns">
          ${talk.roles.map(r=>{const inf=ci(r);return`<button class="rbtn ${r===pRole?'on':''}" onclick="rSet('${r}')">${inf.a} ${r}</button>`;}).join('')}
        </div>
      </div>
      <div class="stabs">
        ${talk.scenes.map((s,i)=>`<button class="stab ${i===pSc?'on':''}" onclick="pScSet(${i})">${s.name}</button>`).join('')}
      </div>
      <div class="cbox" id="cb"></div>
      <div class="mrow">
        <button class="mbtn" id="mb" onclick="togMic()">
          <i class="ti ti-microphone" aria-hidden="true"></i>
          <span id="ml">말하기 🎤</span>
        </button>
        <span class="hlnk" onclick="doHint()">💡 힌트</span>
      </div>
      <div class="mic-tip">💡 Chrome 브라우저 + 마이크 권한 허용 필요 &nbsp;|&nbsp; 모바일에서도 잘 돼요!</div>
    </div>`;
  startPrac();
}
function rSet(r){pRole=r;renderM();}
function pScSet(i){pSc=i;renderM();}
function startPrac(){
  if(rec){try{rec.abort();}catch(e){}rec=null;}
  mic=false;lErr=false;
  const talk=UN[cU].funTalks[0];
  pLines=talk.scenes[pSc].lines;pStep=0;
  const cb=document.getElementById('cb');if(cb)cb.innerHTML='';
  const mb=document.getElementById('mb');if(mb)mb.disabled=false;
  advP();
}
function advP(){
  if(pStep>=pLines.length){addC('hnt','🎉 대화 완성! 정말 잘했어요!','','');const mb=document.getElementById('mb');if(mb)mb.disabled=true;return;}
  const l=pLines[pStep];
  if(l.speaker!==pRole){
    addC('ai',l.en,l.ko,l.speaker);
    sAs(l.speaker,l.en,()=>{pStep++;setTimeout(advP,300);});
  }else{
    lErr=false;
    addC('hnt','내 차례! 👉 <b>'+l.en+'</b>','('+l.ko+')','');
    const mb=document.getElementById('mb');if(mb)mb.disabled=false;
  }
}
function addC(type,text,sub,spk){
  const cb=document.getElementById('cb');if(!cb)return;
  const div=document.createElement('div');
  const isU=type==='usr';
  div.className='cmsg '+(type==='hnt'?'hnt':type==='err'?'err':isU?'usr':'ai');
  const inf=spk?ci(spk):null;
  let av=type==='hnt'?'💡':type==='err'?'❌':isU?ci(pRole).a:inf?inf.a:'🤖';
  const spLbl=spk?`<div style="font-size:10px;font-weight:500;color:${inf.c};margin-bottom:2px">${spk}</div>`:'';
  div.innerHTML=`<div class="cav">${av}</div><div class="cbbl">${spLbl}${text}${sub?'<div style="font-size:11px;opacity:.65;margin-top:2px">'+sub+'</div>':''}</div>`;
  cb.appendChild(div);cb.scrollTop=cb.scrollHeight;
}
function togMic(){
  if(mic){stopMic();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addC('err','Chrome 브라우저에서 사용해 주세요 🙏','','');return;}
  rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=5;
  rec.onstart=()=>{
    mic=true;lErr=false;
    const mb=document.getElementById('mb');if(mb)mb.classList.add('lst');
    const ml=document.getElementById('ml');if(ml)ml.textContent='듣는 중... 🎙️';
  };
  rec.onresult=(e)=>{
    const res=Array.from(e.results[0]).map(r=>r.transcript.trim().toLowerCase());
    const tgt=pLines[pStep].en.toLowerCase().replace(/[.,!?']/g,'').trim();
    const ok=res.some(r=>wOv(r.replace(/[.,!?']/g,'').trim(),tgt)>=0.55);
    addC('usr',res[0],'','');
    if(ok){addC('hnt','👍 잘했어요!','','');pStep++;stopMic();setTimeout(advP,500);}
    else{if(!lErr){addC('err','잘 안 들렸어요. 다시 말해봐! 🎤','','');lErr=true;}stopMic();}
  };
  rec.onerror=(ev)=>{if(ev.error!=='aborted'&&!lErr){addC('err','잘 안 들렸어요. 다시 말해봐! 🎤','','');lErr=true;}stopMic();};
  rec.onend=()=>stopMic();
  try{rec.start();}catch(e){stopMic();}
}
function stopMic(){
  mic=false;try{if(rec)rec.stop();}catch(e){}
  const mb=document.getElementById('mb');if(mb)mb.classList.remove('lst');
  const ml=document.getElementById('ml');if(ml)ml.textContent='말하기 🎤';
}
function wOv(a,b){
  const wa=new Set(a.split(' ').filter(Boolean));const wb=b.split(' ').filter(Boolean);
  if(!wb.length)return 0;return wb.filter(w=>wa.has(w)).length/wb.length;
}
function doHint(){
  if(pStep<pLines.length){
    const l=pLines[pStep];sAs(l.speaker,l.en);lErr=false;
    addC('hnt','💡 힌트: <b>'+l.en+'</b>','('+l.ko+')','');
  }
}
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON')return;
  if(cU<0)return;
  if(cM==='word'||cM==='sentence'){
    if(e.code==='Space'){e.preventDefault();doFlip();}
    if(e.code==='ArrowRight'){e.preventDefault();cGo(1);}
    if(e.code==='ArrowLeft'){e.preventDefault();cGo(-1);}
  }
  if(cM==='talk'){
    if(e.code==='ArrowRight'){e.preventDefault();dGo(1);}
    if(e.code==='ArrowLeft'){e.preventDefault();dGo(-1);}
    if(e.code==='Space'){e.preventDefault();spkLine();}
  }
});
showHome();
</script>
