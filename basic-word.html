<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 단어 아지트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky1:#EAF7EF;
    --sky2:#D8F0E0;
    --leaf:#48B26B;
    --leaf-dark:#2E8B4F;
    --leaf-darker:#1F6B3B;
    --sun:#FFB13D;
    --sun-dark:#F08F1A;
    --berry:#FF6F91;
    --berry-dark:#E24C72;
    --wood:#A9713F;
    --wood-dark:#7C5230;
    --card:#FFFFFF;
    --sand:#FFF8EA;
    --ink:#26362C;
    --ink-soft:#5B6B60;
    --line:#DCEEE0;
    --shadow: 0 6px 0 rgba(31,107,59,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 8%, #FFF6D8 0%, transparent 40%),
      linear-gradient(180deg, var(--sky1), var(--sky2) 60%, #CDEAD6 100%);
    min-height:100vh;
    font-family:'Gowun Dodum', sans-serif;
    color:var(--ink);
    -webkit-tap-highlight-color: transparent;
  }
  h1,h2,h3,.jua{font-family:'Jua', sans-serif; letter-spacing:0.5px;}
  .eng{font-family:'Baloo 2', sans-serif;}
  #app{max-width:900px; margin:0 auto; padding:18px 16px 60px; min-height:100vh;}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand-badge{
    width:44px;height:44px;border-radius:14px;
    background:linear-gradient(160deg, var(--sun), var(--sun-dark));
    display:flex;align-items:center;justify-content:center;font-size:22px;
    box-shadow:0 4px 0 rgba(0,0,0,0.12);
  }
  .brand h1{font-size:22px;margin:0;color:var(--leaf-darker);}
  .coin-pill{
    background:var(--card); border:2px solid var(--sun);
    color:var(--sun-dark); font-family:'Jua',sans-serif;
    border-radius:999px; padding:6px 10px 6px 14px; font-size:15px;
    display:flex; align-items:center; gap:6px;
    box-shadow:0 3px 0 rgba(240,143,26,0.25);
  }
  .coin-reset{
    background:none; border:none; color:var(--sun-dark); font-size:15px; cursor:pointer;
    padding:2px 4px; border-radius:8px; opacity:0.6; line-height:1;
  }
  .coin-reset:hover{opacity:1; background:#FFF3DC;}
  .coin-reset.confirm{opacity:1; background:var(--berry); color:#fff;}

  /* ---------- generic card / button ---------- */
  .panel{
    background:var(--card); border-radius:22px; padding:18px;
    box-shadow:0 8px 24px rgba(31,80,50,0.08);
    margin-bottom:16px;
  }
  .btn{
    font-family:'Jua', sans-serif; cursor:pointer; border:none; outline:none;
    border-radius:14px; padding:12px 18px; font-size:16px;
    transition:transform .08s ease;
    box-shadow:var(--shadow);
  }
  .btn:active{transform:translateY(3px); box-shadow:0 2px 0 rgba(31,107,59,0.18);}
  .btn-leaf{background:var(--leaf); color:#fff; --shadow-color:var(--leaf-dark);}
  .btn-sun{background:var(--sun); color:#5A3A00; box-shadow:0 6px 0 rgba(224,140,20,0.35);}
  .btn-sun:active{box-shadow:0 2px 0 rgba(224,140,20,0.35);}
  .btn-berry{background:var(--berry); color:#fff; box-shadow:0 6px 0 rgba(199,60,95,0.35);}
  .btn-berry:active{box-shadow:0 2px 0 rgba(199,60,95,0.35);}
  .btn-ghost{background:var(--sand); color:var(--ink-soft); box-shadow:0 4px 0 var(--line);}
  .btn-ghost:active{box-shadow:0 2px 0 var(--line);}
  .btn[disabled]{opacity:0.4; cursor:not-allowed; box-shadow:none;}
  .btn-block{width:100%; text-align:center;}

  /* ---------- range buttons ---------- */
  .range-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;}
  .range-btn{
    font-family:'Jua',sans-serif; font-size:14px; padding:9px 14px;
    border-radius:999px; border:2px solid var(--leaf); background:#fff;
    color:var(--leaf-dark); cursor:pointer;
  }
  .range-btn.active{background:var(--leaf); color:#fff;}
  .range-btn.soon{border-color:#C9C9C9; color:#9A9A9A; cursor:default;}
  .range-btn.all{border-color:var(--sun-dark); color:var(--sun-dark);}
  .range-btn.all.active{background:var(--sun); color:#5A3A00;}

  /* ---------- unit grid ---------- */
  .unit-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(92px,1fr));
    gap:8px; margin-bottom:6px;
  }
  .unit-card{
    border:2px solid var(--line); border-radius:14px; padding:8px 6px;
    cursor:pointer; background:#fff; position:relative; transition:.12s; text-align:center;
  }
  .unit-card.selected{
    border-color:var(--leaf); background:linear-gradient(160deg,#F3FBF5,#E4F7EA);
  }
  .unit-card .num{
    font-family:'Jua',sans-serif; font-size:11px; color:var(--sun-dark);
    background:#FFF3DC; display:inline-block; padding:1px 7px; border-radius:8px; margin-bottom:3px;
  }
  .unit-card .ko{font-family:'Jua',sans-serif; font-size:13px; color:var(--ink); line-height:1.25;}
  .unit-card .en{font-size:12px; color:var(--ink-soft);}
  .unit-card .check{
    position:absolute; top:4px; right:6px; font-size:13px; color:var(--leaf);
    opacity:0; transition:.12s;
  }
  .unit-card.selected .check{opacity:1;}
  .unit-card.soon{opacity:0.45; cursor:default;}

  .selbar{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
    background:var(--sand); border-radius:16px; padding:12px 16px; margin:14px 0;
  }
  .selbar .count{font-family:'Jua',sans-serif; color:var(--leaf-darker);}
  .mode-row{display:flex; gap:10px; flex-wrap:wrap;}

  /* ---------- flashcard ---------- */
  .fc-wrap{display:flex; flex-direction:column; align-items:center; gap:16px;}
  .fc-progress{font-family:'Jua',sans-serif; color:var(--ink-soft);}
  .flashcard{
    width:100%; max-width:420px; height:260px; perspective:1200px; cursor:pointer;
  }
  .fc-inner{
    position:relative; width:100%; height:100%; transition:transform .5s;
    transform-style:preserve-3d;
  }
  .flashcard.flipped .fc-inner{transform:rotateY(180deg);}
  .fc-face{
    position:absolute; inset:0; backface-visibility:hidden; border-radius:24px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:20px; box-shadow:0 10px 26px rgba(31,80,50,0.15);
  }
  .fc-front{background:linear-gradient(160deg,#fff,#F2FBF4); border:3px solid var(--leaf);}
  .fc-back{background:linear-gradient(160deg,#FFF8E9,#FFEFCF); border:3px solid var(--sun); transform:rotateY(180deg);}
  .fc-word{font-family:'Baloo 2',sans-serif; font-weight:700; font-size:44px; color:var(--leaf-darker);}
  .fc-mean{font-family:'Jua',sans-serif; font-size:26px; color:var(--sun-dark); margin:8px 0 12px;}
  .fc-ex{font-size:17px; color:var(--ink-soft); font-style:italic;}
  .fc-hint{font-size:12px; color:#98A69D; margin-top:10px;}
  .speak-btn{
    margin-top:12px; background:var(--leaf); color:#fff; border:none; border-radius:999px;
    width:42px; height:42px; font-size:18px; cursor:pointer; box-shadow:0 3px 0 var(--leaf-dark);
  }
  .fc-nav{display:flex; gap:14px; align-items:center;}

  /* ---------- test ---------- */
  .test-progress{display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;}
  .test-bar-bg{background:var(--line); height:10px; border-radius:6px; overflow:hidden; flex:1; margin:0 12px;}
  .test-bar-fill{background:var(--leaf); height:100%; transition:width .3s;}
  .q-box{
    background:linear-gradient(160deg,#fff,#F5FBF6); border:2px solid var(--line); border-radius:20px;
    padding:22px; text-align:center; margin-bottom:16px;
  }
  .q-label{font-size:13px; color:var(--ink-soft); margin-bottom:8px;}
  .q-main{font-family:'Baloo 2',sans-serif; font-weight:700; font-size:32px; color:var(--ink);}
  .q-main.ko-q{font-family:'Jua',sans-serif; font-size:26px;}
  .choices{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .choice{
    background:#fff; border:2px solid var(--line); border-radius:14px; padding:14px 10px;
    font-size:16px; cursor:pointer; text-align:center;
  }
  .choice:hover{border-color:var(--leaf);}
  .choice.correct{background:#E6F7EA; border-color:var(--leaf); color:var(--leaf-darker); font-weight:bold;}
  .choice.wrong{background:#FDEBEF; border-color:var(--berry); color:var(--berry-dark);}
  .choice.choice-focus{border-color:var(--sun-dark); box-shadow:0 0 0 3px rgba(240,143,26,0.25); background:#FFF8EA;}
  .choice[disabled]{cursor:default;}

  /* ---------- game ---------- */
  .game-hud{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px;}
  .hearts{font-size:20px;}
  .timebar-bg{background:var(--line); height:12px; border-radius:8px; flex:1; margin:0 12px; overflow:hidden; min-width:120px;}
  .timebar-fill{background:linear-gradient(90deg,var(--sun),var(--berry)); height:100%; transition:width 1s linear;}
  .target-banner{
    text-align:center; background:linear-gradient(160deg,#FFF3DC,#FFE6B8); border:2px dashed var(--sun-dark);
    border-radius:16px; padding:10px; margin-bottom:10px; font-family:'Jua',sans-serif; font-size:19px; color:var(--sun-dark);
  }
  .game-area{
    position:relative; width:100%; height:360px; border-radius:22px; overflow:hidden;
    background:linear-gradient(180deg,#BEE7F5 0%, #DFF3E1 26%, #A9DDC2 62%, #7FC49E 100%);
    border:3px solid var(--leaf-dark);
  }
  .game-bg-sun{
    position:absolute; top:10px; left:16px; font-size:36px; opacity:0.95; z-index:1;
    filter:drop-shadow(0 0 10px rgba(255,177,61,0.5));
  }
  .game-bg-cloud{
    position:absolute; font-size:26px; opacity:0.85; z-index:1;
    animation-name:cloudDrift; animation-timing-function:linear; animation-iteration-count:infinite;
  }
  @keyframes cloudDrift{ from{ transform:translateX(-80px);} to{ transform:translateX(720px);} }
  .game-bg-hills{
    position:absolute; left:0; right:0; bottom:0; height:70px; z-index:1;
    background:radial-gradient(circle at 20% 100%, #86C79E 0 60px, transparent 61px),
               radial-gradient(circle at 55% 100%, #79BB92 0 80px, transparent 81px),
               radial-gradient(circle at 85% 100%, #86C79E 0 55px, transparent 56px);
  }
  .game-bg-trees{
    position:absolute; bottom:2px; left:0; right:0; z-index:1; text-align:center;
    font-size:24px; letter-spacing:14px; opacity:0.92;
  }
  .treehouse{
    position:absolute; right:6px; bottom:6px; width:78px; text-align:center; z-index:6;
    font-family:'Jua',sans-serif; color:var(--wood-dark); font-size:12px;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,0.15));
  }
  .bubble{
    position:absolute; background:#fff; border:2px solid var(--leaf); border-radius:999px;
    padding:8px 16px; font-family:'Baloo 2',sans-serif; font-weight:700; font-size:17px;
    cursor:pointer; white-space:nowrap; box-shadow:0 4px 10px rgba(0,0,0,0.12);
    animation-timing-function:linear; animation-fill-mode:forwards;
    z-index:8;
  }
  .bubble:active{transform:scale(0.94);}
  .bubble.caught{animation:none !important; transition:all .4s ease; opacity:0; transform:scale(0.2) translateY(-40px);}
  .bubble.missclick{background:#FDEBEF; border-color:var(--berry);}
  @keyframes floatLeft{ from{ transform:translateX(0); } to{ transform:translateX(-980px); } }

  .result-box{text-align:center; padding:10px;}
  .result-big{font-family:'Jua',sans-serif; font-size:40px; color:var(--leaf-darker); margin:6px 0;}
  .result-sub{color:var(--ink-soft); margin-bottom:16px;}
  .shop-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:14px 0;}
  .shop-item{
    background:var(--sand); border-radius:14px; padding:10px 14px; font-size:14px;
    display:flex; align-items:center; gap:8px;
  }
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}

  .toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px; font-size:14px;
    z-index:50; opacity:0; transition:opacity .25s; pointer-events:none;
  }
  .toast.show{opacity:0.92;}

  footer.note{text-align:center; color:#9AAA9F; font-size:12px; margin-top:18px;}

  /* ---------- game layout (side caught panel) ---------- */
  .game-rule{font-size:13px; color:var(--ink-soft); text-align:center; margin-bottom:8px;}
  .game-layout{display:flex; gap:12px;}
  .caught-panel{width:150px; flex-shrink:0; background:var(--sand); border-radius:16px; padding:10px; max-height:360px; overflow-y:auto;}
  .caught-title{font-family:'Jua',sans-serif; font-size:13px; color:var(--wood-dark); margin-bottom:8px; text-align:center;}
  .caught-chip{background:#fff; border:2px solid var(--leaf); border-radius:999px; padding:4px 8px; margin-bottom:6px; font-size:12px; text-align:center; font-family:'Baloo 2',sans-serif;}

  /* ---------- wrong note (오답노트) ---------- */
  .wrong-note{background:#FFF4F6; border:2px dashed var(--berry); border-radius:16px; padding:14px; margin:14px 0; text-align:left;}
  .wrong-note h3{margin:0 0 10px; font-size:16px; color:var(--berry-dark);}
  .wrong-item{background:#fff; border-radius:10px; padding:8px 10px; margin-bottom:8px; font-size:14px;}
  .wrong-item .miss{color:var(--ink-soft); font-size:12px;}

  /* ---------- spelling test ---------- */
  .spell-input{
    font-family:'Baloo 2',sans-serif; font-size:22px; text-align:center; padding:10px 16px;
    border:2px solid var(--leaf); border-radius:14px; width:100%; max-width:320px; outline:none;
  }
  .spell-input:focus{border-color:var(--sun-dark);}
  .spell-input[disabled]{background:#F3F3F3;}
  .spell-feedback{margin:12px 0; font-family:'Jua',sans-serif; font-size:18px; text-align:center;}
  .spell-feedback.ok{color:var(--leaf-dark);}
  .spell-feedback.no{color:var(--berry-dark);}
  .q-hint{font-size:13px; color:var(--sun-dark); margin-top:8px;}

  /* ---------- 선긋기 (matching) ---------- */
  .match-wrap{position:relative; display:flex; justify-content:space-between; gap:8%; padding:6px 1vw;}
  .match-svg{position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1;}
  .match-col{flex:1; display:flex; flex-direction:column; gap:8px; position:relative; z-index:2; min-width:0;}
  .match-item{
    background:#fff; border:2px solid var(--line); border-radius:12px; padding:8px 8px;
    cursor:pointer; text-align:center; font-family:'Baloo 2',sans-serif; font-size:14px; transition:.1s;
    min-height:42px; display:flex; align-items:center; justify-content:center;
    line-height:1.2; word-break:keep-all; overflow-wrap:break-word;
  }
  .match-item.ko-item{font-family:'Jua',sans-serif; font-size:14px;}
  .match-item.selected{border-color:var(--sun-dark); background:#FFF8EA; box-shadow:0 0 0 3px rgba(240,143,26,0.2);}
  .match-item.matched{border-color:var(--leaf); background:#E9F8EE; color:var(--leaf-dark); cursor:default; opacity:0.9;}
  .match-item.shake-wrong{animation:shakeX .4s; border-color:var(--berry); background:#FDEBEF;}
  @keyframes shakeX{0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);}}

  @media (max-width:600px){
    .match-wrap{gap:6%;}
    .match-item{font-size:13px; min-height:38px; padding:6px 6px;}
    .game-layout{flex-direction:column;}
    .caught-panel{width:100%; max-height:110px;}
  }
  @media (max-width:480px){
    .fc-word{font-size:34px;}
    .q-main{font-size:26px;}
    .choices{grid-template-columns:1fr;}
  }
</style>
</head>

<div id="app"></div>
<div class="toast" id="toast"></div>

function addCoins(n){ localStorage.setItem('vc_coins', String(getCoins()+n)); }
function spendCoins(n){ if(getCoins()<n) return false; localStorage.setItem('vc_coins', String(getCoins()-n)); return true; }
let coinResetArmed = false;
let coinResetTimer = null;
function resetCoins(){
  const btn = document.querySelector('.coin-reset');
  if(!coinResetArmed){
    coinResetArmed = true;
    if(btn){ btn.textContent = '✔'; btn.classList.add('confirm'); btn.title='한 번 더 누르면 초기화'; }
    toast('한 번 더 누르면 도토리가 0개가 돼요!');

    coinResetTimer = setTimeout(()=>{
      coinResetArmed = false;

      if(b){ b.textContent = '↺'; b.classList.remove('confirm'); b.title='도토리 초기화'; }

/* 오답(복습) 단어장: 틀린 단어의 en 값을 저장 */
function getWrongBank(){ try{ return JSON.parse(localStorage.getItem('vc_wrong')||'[]'); }catch(e){ return []; } }
function saveWrongBank(arr){ localStorage.setItem('vc_wrong', JSON.stringify(arr)); }
function addWrongWord(en){ const bank=getWrongBank(); if(!bank.includes(en)){ bank.push(en); saveWrongBank(bank); } }
function removeWrongWord(en){ let bank=getWrongBank(); if(bank.includes(en)){ bank=bank.filter(x=>x!==en); saveWrongBank(bank); } }
function getWrongCountInPool(){ const bank=new Set(getWrongBank()); return getPool().filter(w=>bank.has(w.en)).length; }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 1600);
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function sample(arr,n){ return shuffle(arr).slice(0,n); }

function getPool(){
  let words = [];
  UNITS.filter(u=>state.selected.has(u.id)).forEach(u=>{ words = words.concat(u.words); });
  return words;
}

/* Web Audio 효과음 (외부 파일 없이 오실레이터 사용) */
let actx;
function beep(freq,dur,type,vol){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(vol||0.15, actx.currentTime);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime+dur);
    o.stop(actx.currentTime+dur);
  }catch(e){}
}
function sfxCorrect(){ beep(880,0.1,'sine',0.18); setTimeout(()=>beep(1300,0.14,'sine',0.16),90); }
function sfxWrong(){ beep(160,0.25,'sawtooth',0.15); }
function sfxCatch(){ beep(1000,0.08,'triangle',0.15); setTimeout(()=>beep(1500,0.1,'triangle',0.13),70); }
function sfxTick(){ beep(500,0.05,'square',0.06); }
function sfxGameOver(){ beep(300,0.2,'sawtooth',0.15); setTimeout(()=>beep(220,0.3,'sawtooth',0.15),180); }

function normalizeSpeechText(text){
  return text
    .replace(/\bMrs\.\s*/g, 'Missus ')
    .replace(/\bMr\.\s*/g, 'Mister ')
    .replace(/\bMs\.\s*/g, 'Miz ');
}
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(normalizeSpeechText(text));
  u.lang='en-US'; u.rate=0.88;
  window.speechSynthesis.speak(u);
}

/* ---------------- 테스트 ---------------- */
function buildQuestion(pool, word){
  const type = ['w2m','m2w','sentence'][Math.floor(Math.random()*3)];
  const distractPool = pool.filter(x=>x.en!==word.en);
  const distract = sample(distractPool, Math.min(3, distractPool.length));
  if(type==='w2m'){
    const choices = shuffle([word.ko, ...distract.map(d=>d.ko)]);
    return {type, prompt:word.en, promptClass:'eng', answer:word.ko, choices, wordEn:word.en, wordKo:word.ko};
  } else if(type==='m2w'){
    const choices = shuffle([word.en, ...distract.map(d=>d.en)]);
    return {type, prompt:word.ko, promptClass:'ko-q', answer:word.en, choices, wordEn:word.en, wordKo:word.ko};
  } else {
    const blanked = word.ex.replace(new RegExp(word.en.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'), '_____');
    const choices = shuffle([word.en, ...distract.map(d=>d.en)]);
    return {type, prompt:blanked, promptClass:'eng', answer:word.en, choices, wordEn:word.en, wordKo:word.ko, hint:word.ko, exSentence:word.ex};
  }
}
function startTest(reviewMode){
  const fullPool = getPool();
  let pool = fullPool;
  if(reviewMode){
    const bank = new Set(getWrongBank());
    pool = fullPool.filter(w=>bank.has(w.en));
    if(pool.length===0){ toast('복습할 단어가 없어요! 테스트를 먼저 풀어보세요 🌱'); go('home'); return; }
  }
  const n = Math.min(10, pool.length);
  const words = sample(pool, n);
  const distractSource = fullPool.length>=4 ? fullPool : pool;
  state.test = {list: words.map(w=>buildQuestion(distractSource,w)), idx:0, score:0, answered:false, reviewMode:!!reviewMode, focusIdx:0};
  go('test');
}
function renderTestSetup(){
  const count = getPool().length;
  if(count===0){
    return `<div class="panel">먼저 과를 선택해주세요.<br><button class="btn btn-leaf" onclick="go('home')" style="margin-top:10px;">과 선택으로</button></div>`;
  }
  const wrongCount = getWrongCountInPool();
  return `<div class="panel">
    <h2>📝 테스트 선택</h2>
    <p>단어의 뜻, 단어 자체, 문장 빈칸 채우기가 랜덤으로 출제돼요 (최대 10문제).</p>

      <button class="btn btn-sun" onclick="startTest(false)">전체 단어로 (${count}개 중 출제)</button>

    </div>
    <button class="btn btn-ghost" style="margin-top:14px;" onclick="go('home')">과 선택으로</button>
  </div>`;
}
function renderTest(){
  const {list, idx, score, answered, focusIdx} = state.test;
  if(list.length===0) return `<div class="panel">단어가 없어요. 과를 선택해주세요.</div>`;
  const q = list[idx];
  const pct = Math.round((idx)/list.length*100);
  const label = q.type==='w2m' ? '이 단어의 뜻은?' : q.type==='m2w' ? '이 뜻에 맞는 단어는?' : '빈칸에 알맞은 단어는?';
  const choices = q.choices.map((c,i)=>{
    let cls='choice';
    if(answered){
      if(c===q.answer) cls+=' correct';
      else if(c===q._picked) cls+=' wrong';
    } else if(i===focusIdx){
      cls+=' choice-focus';
    }
    return `<div class="choice ${cls}" onclick="pickAnswer('${encodeURIComponent(c)}')">${c}</div>`;
  }).join('');
  return `
  <div class="panel">
    <div class="test-progress">
      <span class="jua">${idx+1}/${list.length}</span>
      <div class="test-bar-bg"><div class="test-bar-fill" style="width:${pct}%"></div></div>
      <span class="jua">🌰 ${score}</span>
    </div>
    <div class="q-box">
      <div class="q-label">${label}</div>
      <div class="q-main ${q.promptClass}">${q.prompt}</div>
      ${q.hint ? `<div class="q-hint">💡 힌트(뜻): ${q.hint}</div>` : ''}
    </div>
    <div class="choices">${choices}</div>
    <div class="q-hint" style="text-align:center;">⌨️ 화살표로 이동, Enter로 선택/다음</div>
    <div style="text-align:center; margin-top:8px;">
      <button class="btn btn-leaf" ${answered?'':'disabled'} onclick="nextQuestion()">${idx+1<list.length?'다음 문제':'결과 보기'} ▶</button>
    </div>
  </div>`;
}
function pickAnswer(encoded){
  if(state.test.answered) return;
  const c = decodeURIComponent(encoded);
  const q = state.test.list[state.test.idx];
  q._picked = c;
  state.test.answered = true;
  if(c===q.answer){ state.test.score++; sfxCorrect(); } else { sfxWrong(); }
  render();
  setTimeout(()=>{
    if(q.type==='sentence' && q.exSentence) speak(q.exSentence);
    else speak(q.wordEn);
  }, 250);
}
function nextQuestion(){
  if(state.test.idx+1 < state.test.list.length){
    state.test.idx++; state.test.answered=false; state.test.focusIdx=0; render();
  } else {
    state.test.list.forEach(q=>{
      if(q._picked===q.answer){ if(state.test.reviewMode) removeWrongWord(q.wordEn); }
      else { addWrongWord(q.wordEn); }
    });
    const earned = state.test.score*2;
    addCoins(earned);
    state.test._earned = earned;
    go('testResult');
  }
}
function renderTestResult(){
  const {score, list} = state.test;

      ${wrongs.map(q=>`<div class="wrong-item"><b class="eng">${q.wordEn}</b> — ${q.wordKo}<br><span class="miss">내가 고른 답: ${q._picked||'(선택 안함)'} → 정답: ${q.answer}</span></div>`).join('')}
    </div>` : `<div class="result-sub">🎉 전부 다 맞췄어요! 완벽해요!</div>`;
  return `<div class="panel result-box">
    <h2>🎉 테스트 완료!</h2>
    <div class="result-big">${score} / ${total}</div>
    <div class="result-sub">🌰 코인 ${earned}개 획득! (현재 ${getCoins()}개)</div>
    ${wrongHtml}
    <div class="btn-row">
      <button class="btn btn-berry" onclick="go('gameSetup')">🏹 게임하러 가기</button>
      <button class="btn btn-sun" onclick="startTest(false)">🔁 다시 테스트</button>
      <button class="btn btn-ghost" onclick="go('home')">과 선택으로</button>
    </div>
  </div>`;
}

      <span class="jua">🌰 ${score}</span>
    </div>
    <div class="q-box">
      <div class="q-label">이 뜻에 맞는 영어 단어를 써보세요</div>
      <div class="q-main ko-q">${w.ko}</div>
    </div>
    <div style="text-align:center;">
      <input id="spellInput" class="spell-input" autocomplete="off" ${answered?'disabled':''} placeholder="영어로 입력..." onkeydown="if(event.key==='Enter'){ event.preventDefault(); ${answered?'nextSpell()':'submitSpell()'}; }">
    </div>
    ${feedback}
    <div class="q-hint" style="text-align:center;">⌨️ Enter로 확인, 채점 후 → 또는 Enter로 다음 문제</div>
    <div style="text-align:center; margin-top:14px;">
      ${answered
        ? `<button class="btn btn-leaf" onclick="nextSpell()">${idx+1<list.length?'다음 문제':'결과 보기'} ▶</button>`
        : `<button class="btn btn-sun" onclick="submitSpell()">확인</button>`}
    </div>
  </div>`;
}
function submitSpell(){
  const inp = document.getElementById('spellInput');
  if(!inp || state.spell.answered) return;
  const val = inp.value.trim();
  const w = state.spell.list[state.spell.idx];
  const correct = val.length>0 && val.toLowerCase()===w.en.toLowerCase();
  state.spell.answered = true;
  state.spell._correct = correct;
  if(correct){
    state.spell.score++; sfxCorrect();
    if(state.spell.reviewMode) removeWrongWord(w.en);
  } else {
    sfxWrong(); addWrongWord(w.en);
    state.spell.wrongList.push({en:w.en, ko:w.ko, picked:val});
  }
  render();
  setTimeout(()=>speak(w.en), 250);
}
function nextSpell(){
  if(state.spell.idx+1 < state.spell.list.length){
    state.spell.idx++; state.spell.answered=false; render();
  } else {
    const earned = state.spell.score*3;
    addCoins(earned);
    state.spell._earned = earned;
    go('spellResult');
  }
}
function renderSpellResult(){
  const {score, list, wrongList} = state.spell;
  const total = list.length;
  const earned = state.spell._earned||0;
  const wrongHtml = wrongList && wrongList.length ? `
    <div class="wrong-note">
      <h3>📒 오답 노트</h3>
      ${wrongList.map(x=>`<div class="wrong-item"><b class="eng">${x.en}</b> — ${x.ko}<br><span class="miss">내가 쓴 답: ${x.picked||'(입력 안함)'}</span></div>`).join('')}
    </div>` : `<div class="result-sub">🎉 전부 다 맞췄어요! 완벽해요!</div>`;
  return `<div class="panel result-box">
    <h2>✏️ 단어 쓰기 완료!</h2>
    <div class="result-big">${score} / ${total}</div>
    <div class="result-sub">🌰 코인 ${earned}개 획득! (현재 ${getCoins()}개)</div>
    ${wrongHtml}
    <div class="btn-row">
      <button class="btn btn-berry" onclick="go('gameSetup')">🏹 게임하러 가기</button>
      <button class="btn btn-sun" onclick="go('spellSetup')">🔁 다시 쓰기</button>
      <button class="btn btn-ghost" onclick="go('home')">과 선택으로</button>
    </div>
  </div>`;
}

/* ---------------- 선긋기 (매칭) ---------------- */
function renderMatchSetup(){
  const count = getPool().length;
  if(count===0){
    return `<div class="panel">먼저 과를 선택해주세요.<br><button class="btn btn-leaf" onclick="go('home')" style="margin-top:10px;">과 선택으로</button></div>`;
  }
  const wrongCount = getWrongCountInPool();
  return `<div class="panel">
    <h2>🔗 선긋기</h2>
    <p>왼쪽 영단어를 누르고, 뜻이 맞는 오른쪽 카드를 눌러서 선으로 이어보세요! (한 판에 최대 8쌍)</p>
    <div class="btn-row">
      <button class="btn btn-sun" onclick="startMatch(false)">전체 단어로 (${count}개 중 출제)</button>
      <button class="btn btn-berry" ${wrongCount===0?'disabled':''} onclick="startMatch(true)">복습: 틀렸던 단어만 (${wrongCount}개)</button>
    </div>
    <button class="btn btn-ghost" style="margin-top:14px;" onclick="go('home')">과 선택으로</button>
  </div>`;
}
function startMatch(reviewMode){
  const fullPool = getPool();
  let pool = fullPool;
  if(reviewMode){
    const bank = new Set(getWrongBank());
    pool = fullPool.filter(w=>bank.has(w.en));
    if(pool.length===0){ toast('복습할 단어가 없어요! 테스트를 먼저 풀어보세요 🌱'); go('home'); return; }
  }
  const n = Math.min(8, pool.length);
  const words = sample(pool, n);
  const leftOrder = shuffle(words.map((w,i)=>i));
  const rightOrder = shuffle(words.map((w,i)=>i));
  state.match = {
    words, leftOrder, rightOrder,
    matchedIdx: new Set(), selectedLeft:null, selectedRight:null,
    mistakes:0, reviewMode:!!reviewMode, wrongIdx: new Set()
  };
  go('match');
}
function renderMatch(){
  const m = state.match;
  if(!m || !m.words.length) return `<div class="panel">단어가 없어요.</div>`;
  const total = m.words.length;
  const doneCount = m.matchedIdx.size;
  const leftHtml = m.leftOrder.map(i=>{
    const w = m.words[i];
    const matched = m.matchedIdx.has(i);
    const sel = m.selectedLeft===i;
    return `<div class="match-item ${matched?'matched':''} ${sel?'selected':''}" id="ml${i}" onclick="${matched?'':`selectMatchItem('left',${i})`}">${w.en}</div>`;
  }).join('');
  const rightHtml = m.rightOrder.map(i=>{
    const w = m.words[i];
    const matched = m.matchedIdx.has(i);
    const sel = m.selectedRight===i;
    return `<div class="match-item ko-item ${matched?'matched':''} ${sel?'selected':''}" id="mr${i}" onclick="${matched?'':`selectMatchItem('right',${i})`}">${w.ko}</div>`;
  }).join('');
  return `
  <div class="panel">
    <div class="test-progress">
      <span class="jua">맞춘 짝: ${doneCount}/${total}</span>
      <div class="test-bar-bg"><div class="test-bar-fill" style="width:${Math.round(doneCount/total*100)}%"></div></div>
      <span class="jua">❌ ${m.mistakes}</span>
    </div>
    <div class="q-label" style="text-align:center; margin-bottom:8px;">영단어와 뜻을 눌러서 선으로 이어보세요</div>
    <div class="match-wrap" id="matchWrap">
      <svg id="matchSvg" class="match-svg"></svg>
      <div class="match-col">${leftHtml}</div>
      <div class="match-col">${rightHtml}</div>
    </div>
  </div>`;
}
function selectMatchItem(side, idx){
  const m = state.match;
  if(!m || m.matchedIdx.has(idx)) return;
  if(side==='left'){
    m.selectedLeft = (m.selectedLeft===idx) ? null : idx;
  } else {
    m.selectedRight = (m.selectedRight===idx) ? null : idx;
  }
  render();
  if(m.selectedLeft!=null && m.selectedRight!=null){
    setTimeout(checkMatch, 60);
  }
}
function checkMatch(){
  const m = state.match;
  if(!m) return;
  const li = m.selectedLeft, ri = m.selectedRight;
  if(li==null || ri==null) return;
  if(li === ri){
    m.matchedIdx.add(li);
    m.selectedLeft = null; m.selectedRight = null;
    sfxCorrect();
    speak(m.words[li].en);
    render();
    if(m.matchedIdx.size === m.words.length){
      finishMatch();
    }
  } else {
    m.mistakes++;
    m.wrongIdx.add(li);
    sfxWrong();
    const lEl = document.getElementById('ml'+li);
    const rEl = document.getElementById('mr'+ri);
    if(lEl) lEl.classList.add('shake-wrong');
    if(rEl) rEl.classList.add('shake-wrong');
    setTimeout(()=>{
      m.selectedLeft = null; m.selectedRight = null;
      render();
    }, 420);
  }
}
function drawAllLines(){
  const m = state.match;
  if(!m) return;
  const svg = document.getElementById('matchSvg');
  const wrap = document.getElementById('matchWrap');
  if(!svg || !wrap) return;
  svg.innerHTML = '';
  const wrapRect = wrap.getBoundingClientRect();
  m.matchedIdx.forEach(i=>{
    const lEl = document.getElementById('ml'+i);
    const rEl = document.getElementById('mr'+i);
    if(!lEl || !rEl) return;
    const lr = lEl.getBoundingClientRect(), rr = rEl.getBoundingClientRect();
    const x1 = lr.right - wrapRect.left, y1 = lr.top - wrapRect.top + lr.height/2;
    const x2 = rr.left - wrapRect.left, y2 = rr.top - wrapRect.top + rr.height/2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#48B26B'); line.setAttribute('stroke-width', '3');
    line.setAttribute('stroke-linecap', 'round');
    svg.appendChild(line);
  });
}
function finishMatch(){
  const m = state.match;
  m.wrongIdx.forEach(i=>addWrongWord(m.words[i].en));
  if(m.reviewMode){
    m.words.forEach((w,i)=>{ if(!m.wrongIdx.has(i)) removeWrongWord(w.en); });
  }
  const earned = Math.max(0, m.words.length*2 - m.mistakes);
  addCoins(earned);
  m._earned = earned;
  go('matchResult');
}
function renderMatchResult(){
  const m = state.match;
  const total = m.words.length;
  const wrongWords = [...m.wrongIdx].map(i=>m.words[i]);
  const wrongHtml = wrongWords.length ? `
    <div class="wrong-note">
      <h3>📒 헷갈렸던 단어</h3>
      ${wrongWords.map(w=>`<div class="wrong-item"><b class="eng">${w.en}</b> — ${w.ko}</div>`).join('')}
    </div>` : `<div class="result-sub">🎉 한 번도 안 틀리고 다 이었어요!</div>`;
  return `<div class="panel result-box">
    <h2>🔗 선긋기 완료!</h2>
    <div class="result-big">${total}쌍 연결!</div>
    <div class="result-sub">틀린 횟수: ${m.mistakes}번 · 🌰 코인 ${m._earned}개 획득 (현재 ${getCoins()}개)</div>
    ${wrongHtml}
    <div class="btn-row">
      <button class="btn btn-berry" onclick="go('gameSetup')">🏹 게임하러 가기</button>
      <button class="btn btn-sun" onclick="go('matchSetup')">🔁 다시 선긋기</button>
      <button class="btn btn-ghost" onclick="go('home')">과 선택으로</button>
    </div>
  </div>`;
}

const gameSetupState = {hearts:3, time:60};
function buyHeart(){

function clearGameTimers(){

}

/* 배경음악: 외부 파일 없이 Web Audio로 만드는 배경음악. 완전히 똑같은 반복이 아니라
   코드가 천천히 바뀌고(C→F→G) 멜로디도 음계 안에서 매번 조금씩 달라지도록 구성 */
let bgMusicNodes = null;
function startBgMusic(){
  stopBgMusic();
  const scale = [523.25,587.33,659.25,783.99,880.00,1046.5]; // 도레미솔라도 (5음계, 반음 없어서 안정적)
  const bassRoots = [130.81, 174.61, 196.00]; // C-F-G 코드 루트, 일정 마디마다 전환
  let step = 0;
  let lastNote = null;
  const stepMs = 300; // 여유 있는 템포
  const chordLenSteps = 16; // 16박마다 코드 전환

  function playStep(){
    const root = bassRoots[Math.floor(step/chordLenSteps) % bassRoots.length];
    if(step % 4 === 0) beep(root, 0.32, 'sine', 0.055); // 베이스는 4박마다만, 은은하게

    if(Math.random() < 0.65){ // 나머지는 쉼표라 덜 빽빽하고 덜 반복적으로 들림
      let note;
      do{ note = scale[Math.floor(Math.random()*scale.length)]; } while(note===lastNote && scale.length>1);
      lastNote = note;
      beep(note, 0.24, 'triangle', 0.085);
    } else {
      lastNote = null;
    }
    step++;
  }
  playStep();
  const seqInt = setInterval(playStep, stepMs);
  bgMusicNodes = {seqInt};
}
function stopBgMusic(){
  if(bgMusicNodes){
    clearInterval(bgMusicNodes.seqInt);
    bgMusicNodes = null;
  }
}

function startGame(){
  const pool = shuffle(getPool());
  state.game = {
    pool, score:0, hearts:gameSetupState.hearts, timeLeft:gameSetupState.time, totalTime:gameSetupState.time,
    target:null, bubbles:[], bubbleSeq:0, running:true, caughtCount:0, caughtWords:[]
  };
  gameSetupState.hearts = 3; gameSetupState.time = 60; // 다음 판을 위해 초기화
  go('game');
}

function renderGame(){
  const g = state.game;
  const pct = Math.max(0, Math.round(g.timeLeft/g.totalTime*100));
  return `
  <div class="panel">
    <div class="game-hud">
      <div class="hearts">${'❤️'.repeat(g.hearts)}${'🤍'.repeat(Math.max(0,6-g.hearts))}</div>
      <div class="timebar-bg"><div class="timebar-fill" id="timeFill" style="width:${pct}%"></div></div>
      <div class="jua" id="timeText">⏱️ ${g.timeLeft}초</div>
      <div class="jua" id="scoreText">🌰 ${g.score}</div>
    </div>
    <div class="target-banner" id="targetBanner">단어를 준비하고 있어요...</div>
    <div class="game-rule">👉 위에 나온 <b>뜻</b>과 같은 <b>영단어 풍선</b>을 클릭해서 잡으세요!</div>
    <div class="game-layout">
      <div class="game-area" id="gameArea">
        <div class="game-bg-sun">☀️</div>
        <div class="game-bg-cloud" style="top:8%; animation-duration:26s;">☁️</div>
        <div class="game-bg-cloud" style="top:20%; font-size:20px; animation-duration:34s;">☁️</div>
        <div class="game-bg-cloud" style="top:3%; font-size:18px; animation-duration:42s;">☁️</div>
        <div class="game-bg-hills"></div>
        <div class="game-bg-trees">🌲🌳🌲🌳🌲🌳</div>
        <div class="treehouse">🌳🏠</div>
      </div>
      <div class="caught-panel">
        <div class="caught-title">🧺 모은 단어 (${g.caughtCount})</div>
        <div id="caughtList" class="caught-list"></div>
      </div>
    </div>
  </div>`;
}

function pickNewTarget(){
  const g = state.game;
  if(!g.pool.length) return;
  const idx = Math.floor(Math.random()*g.pool.length);
  g.target = g.pool[idx];
  const banner = document.getElementById('targetBanner');
  if(banner) banner.innerHTML = `이 뜻과 같은 단어를 찾아라: <b>${g.target.ko}</b> 🌰`;
}

function spawnBubble(){
  const g = state.game;
  const area = document.getElementById('gameArea');
  if(!area || !g.running || !g.target) return;
  const isTarget = Math.random() < 0.35 || g.bubbles.filter(b=>b.isTarget).length===0;
  let word;
  if(isTarget){ word = g.target; }
  else {
    const others = g.pool.filter(w=>w.en!==g.target.en);
    word = others.length ? others[Math.floor(Math.random()*others.length)] : g.pool[Math.floor(Math.random()*g.pool.length)];
  }
  const id = 'b'+(g.bubbleSeq++);
  const top = 10 + Math.random()*75; // %
  const dur = 6 + Math.random()*4; // seconds
  const el = document.createElement('div');
  el.className = 'bubble';
  el.id = id;
  el.textContent = word.en;
  el.style.top = top+'%';
  el.style.right = '-160px';
  el.style.animation = `floatLeft ${dur}s linear forwards`;
  el.onclick = ()=>handleBubbleClick(id, word);
  area.appendChild(el);
  g.bubbles.push({id, word, isTarget: word.en===g.target.en});
  el.addEventListener('animationend', ()=>{
    el.remove();
    g.bubbles = g.bubbles.filter(b=>b.id!==id);
  });
}

function handleBubbleClick(id, word){
  const g = state.game;
  if(!g.running) return;
  const el = document.getElementById(id);
  if(!el) return;
  if(g.target && word.en===g.target.en){
    g.score += 10; g.caughtCount++;
    g.caughtWords.push(word.en);
    sfxCatch();
    el.classList.add('caught');
    g.bubbles = g.bubbles.filter(b=>b.id!==id);
    if(g.caughtCount % 3===0) addCoins(1);
    toast(`✅ 정답! "${word.en}" 캐치! +10점`);
    addCaughtChip(word.en);
    pickNewTarget();
    updateHud();
    setTimeout(()=>el.remove(), 400);
  } else {
    g.hearts--; sfxWrong();
    el.classList.add('missclick');
    toast(`❌ 오답! 정답은 "${g.target?g.target.en:''}" 이었어요 (하트 -1)`);
    setTimeout(()=>{ el.remove(); g.bubbles = g.bubbles.filter(b=>b.id!==id); }, 250);
    updateHud();
    if(g.hearts<=0) endGame();
  }
}

function addCaughtChip(en){
  const listEl = document.getElementById('caughtList');
  if(!listEl) return;
  const chip = document.createElement('div');
  chip.className = 'caught-chip';
  chip.textContent = en;
  listEl.prepend(chip);
}

function updateHud(){
  const g = state.game;
  const heartsEl = document.querySelector('.game-hud .hearts');
  const scoreEl = document.getElementById('scoreText');
  const caughtTitle = document.querySelector('.caught-title');
  if(heartsEl) heartsEl.innerHTML = '❤️'.repeat(Math.max(0,g.hearts))+'🤍'.repeat(Math.max(0,6-g.hearts));
  if(scoreEl) scoreEl.textContent = '🌰 '+g.score;
  if(caughtTitle) caughtTitle.textContent = `🧺 모은 단어 (${g.caughtCount})`;
}

function initGame(){
  const g = state.game;
  if(!g) return;
  pickNewTarget();
  startBgMusic();
  const spawnInt = setInterval(()=>{ if(g.running) spawnBubble(); }, 1100);
  for(let i=0;i<3;i++) setTimeout(spawnBubble, i*350);
  const tickInt = setInterval(()=>{
    if(!g.running) return;
    g.timeLeft--;
    const fill = document.getElementById('timeFill');
    const timeTextEl = document.getElementById('timeText');
    if(fill) fill.style.width = Math.max(0, Math.round(g.timeLeft/g.totalTime*100))+'%';
    if(timeTextEl) timeTextEl.textContent = '⏱️ '+Math.max(0,g.timeLeft)+'초';
    if(g.timeLeft<=10 && g.timeLeft>0) sfxTick();
    if(g.timeLeft<=0){ endGame(); }
  }, 1000);
  state.gameTimers.push(spawnInt, tickInt);
}

function endGame(){
  const g = state.game;
  if(!g || !g.running) return;
  g.running = false;
  clearGameTimers();
  sfxGameOver();
  const earned = Math.round(g.score/10) + (g.hearts>0?5:0);
  addCoins(earned);
  g._earned = earned;
  go('gameResult');
}

function renderGameResult(){
  const g = state.game;
  const cleared = g.hearts>0;
  return `<div class="panel result-box">
    <h2>${cleared? '🏆 아지트에 단어를 가득 모았어요!' : '💧 하트를 모두 잃었어요'}</h2>
    <div class="result-big">${g.score}점</div>
    <div class="result-sub">잡은 단어: ${g.caughtCount}개 · 🌰 코인 ${g._earned}개 획득 (현재 ${getCoins()}개)</div>
    <div class="btn-row">
      <button class="btn btn-berry" onclick="go('gameSetup')">🔁 다시 도전</button>
      <button class="btn btn-sun" onclick="go('testSetup')">📝 테스트로</button>
      <button class="btn btn-ghost" onclick="go('home')">과 선택으로</button>
    </div>
  </div>`;
}

/* ============================================================
   6. 키보드 컨트롤
   - 플래시카드: ← → 이동, Space 뒤집기
   - 테스트: ← ↑ → ↓ 로 보기 이동, Enter/Space로 선택 및 다음 문제
   - 단어 쓰기: 채점 후 → 또는 Enter로 다음 문제
   ============================================================ */
document.addEventListener('keydown', (e)=>{
  if(state.screen==='flash'){
    if(e.code==='ArrowLeft'){ e.preventDefault(); fcMove(-1); }
    else if(e.code==='ArrowRight'){ e.preventDefault(); fcMove(1); }
    else if(e.code==='Space'){ e.preventDefault(); flipCard(); }
    return;
  }
  if(state.screen==='test'){
    const t = state.test;
    if(!t || !t.list.length) return;
    if(t.answered){
      if(e.code==='ArrowRight' || e.code==='Enter' || e.code==='Space'){ e.preventDefault(); nextQuestion(); }
      return;
    }
    const total = t.list[t.idx].choices.length;
    if(e.code==='ArrowRight' || e.code==='ArrowDown'){ e.preventDefault(); t.focusIdx = (t.focusIdx+1)%total; render(); }
    else if(e.code==='ArrowLeft' || e.code==='ArrowUp'){ e.preventDefault(); t.focusIdx = (t.focusIdx-1+total)%total; render(); }
    else if(e.code==='Enter' || e.code==='Space'){ e.preventDefault(); pickAnswer(encodeURIComponent(t.list[t.idx].choices[t.focusIdx])); }
    return;
  }
  if(state.screen==='spell'){
    const s = state.spell;
    if(!s || !s.list.length) return;
    if(s.answered && (e.code==='ArrowRight' || e.code==='Enter')){ e.preventDefault(); nextSpell(); }
    return;
  }
});

/* ============================================================
   7. 시작
   ============================================================ */
render();
</script>
</body>
</html>
